// ── 游泳池竞速 ──
let poolMode = 'npc';       // 'npc' | 'multi'
let poolDifficulty = '';    // 'easy' | 'medium' | 'hard'
let poolLobbyPage = 'main'; // 'main' | 'difficulty' | 'waiting'
let poolWaiters = [];       // [{name,color}] 多人等待列表
let poolWaitTimer = 0;      // 多人倒计时
let poolLobbyBtns = [];     // [{x,y,w,h,action}] 当前帧大厅按钮

const POOL_NPC_SPEEDS = { easy:[0.9,1.3], medium:[1.8,2.3], hard:[3.0,3.8] };
const POOL_NPC_COLORS = ['#e05050','#50b850','#5066d0','#d0a020'];
const POOL_NPC_NAMES  = ['阿虎','晓燕','老王','小花'];

function poolInitRace(difficulty) {
  const startX = W * 0.06;
  poolPlayerLane = Math.floor(Math.random() * 5);
  poolPlayerX = startX; poolResult = 0; poolReward = 0;
  poolCountdown = 3; poolCountdownTimer = 0;
  const [lo, hi] = POOL_NPC_SPEEDS[difficulty] || POOL_NPC_SPEEDS.medium;
  const npcLanes = [0,1,2,3,4].filter(i => i !== poolPlayerLane);
  poolNpcs = npcLanes.map((lane, i) => ({
    x: startX, lane, speed: lo + Math.random() * (hi - lo),
    color: POOL_NPC_COLORS[i], name: POOL_NPC_NAMES[i], finished: false, rank: 0,
  }));
  poolPhase = 'countdown';
}

function poolHandleLobbyClick(action) {
  if (action === 'npc') { poolMode = 'npc'; poolLobbyPage = 'difficulty'; return; }
  if (action === 'multi') {
    poolMode = 'multi'; poolLobbyPage = 'waiting';
    poolWaiters = myAgent ? [{ name: myAgent.name, color: myAgent.color }] : [];
    poolWaitTimer = 0;
    if (socket) socket.emit('pool:join_lobby', { name: myAgent?.name, color: myAgent?.color });
    return;
  }
  if (['easy','medium','hard'].includes(action)) {
    poolDifficulty = action;
    poolInitRace(action);
    return;
  }
  if (action === 'multi_start') {
    if (socket) socket.emit('pool:race_start', {});
    poolInitRace('medium');
    return;
  }
  if (action === 'cancel_wait') {
    poolLobbyPage = 'main';
    poolWaiters = [];
    if (socket) socket.emit('pool:leave_lobby', {});
    return;
  }
  if (action === 'back') { poolLobbyPage = 'main'; return; }
  if (action === 'leave') { poolPhase = 'leaving'; setStatus('🏊 离开泳池...'); }
}

function updatePoolTransition() {
  if (poolPhase === 'none') return;
  const finishX = W * 0.88;

  if (poolPhase === 'entering') {
    poolAlpha = Math.min(1, poolAlpha + 0.04);
    if (poolAlpha >= 1) { poolPhase = 'lobby'; poolLobbyPage = 'main'; poolWaiters = []; }
  } else if (poolPhase === 'lobby') {
    // 多人等待倒计时——有2人时60秒内可开始，超120秒自动开始
    if (poolLobbyPage === 'waiting') {
      poolWaitTimer++;
      if (poolWaitTimer > 120 * 60) poolInitRace('medium'); // 超时自动开始
    }
  } else if (poolPhase === 'countdown') {
    poolCountdownTimer++;
    if (poolCountdownTimer >= 70) { poolCountdown--; poolCountdownTimer = 0; }
    if (poolCountdown < 0) poolPhase = 'racing';
  } else if (poolPhase === 'racing') {
    let ranked = poolNpcs.filter(n => n.finished).length;
    for (const npc of poolNpcs) {
      if (!npc.finished) { npc.x = Math.min(finishX, npc.x + npc.speed); }
      if (!npc.finished && npc.x >= finishX) { npc.finished = true; npc.rank = ++ranked; }
    }
    if (poolPlayerX >= finishX && poolResult === 0) {
      poolResult = poolNpcs.filter(n => n.finished).length + 1;
      const rewards = [50, 35, 25, 15, 10];
      poolReward = rewards[Math.min(poolResult - 1, 4)];
      poolPhase = 'finished';
      if (myAgent) {
        myAgent.money += poolReward;
        localStorage.setItem('kaon_money_' + myAgent.name, myAgent.money);
        syncMoneyToServer(); updateCharPanel(myAgent);
        setStatus(`🏊 第${poolResult}名！+${poolReward}金币`);
      }
    }
  } else if (poolPhase === 'leaving') {
    poolAlpha = Math.max(0, poolAlpha - 0.04);
    if (poolAlpha <= 0) {
      poolPhase = 'none'; activeInteraction = null; manualMode = false;
      if (poolLobbyPage === 'waiting' && socket) socket.emit('pool:leave_lobby', {});
      poolLobbyPage = 'main'; poolWaiters = [];
      pickTarget(myAgent);
      if (socket) socket.emit('player:interaction', { id: null });
    }
  }
}

function drawPoolLobbyBtn(label, x, y, w, h, accent, action) {
  const hov = (accent === '#ffcc00') ? '#ffe066' : accent;
  ctx.fillStyle = 'rgba(5,20,35,0.92)'; ctx.fillRect(x, y, w, h);
  ctx.strokeStyle = accent; ctx.lineWidth = 2; ctx.strokeRect(x, y, w, h);
  ctx.fillStyle = accent; ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText(label, x + w / 2, y + h / 2 + 5);
  poolLobbyBtns.push({ x, y, w, h, action });
}

function drawPoolWater(startX, padY, poolW, poolH, laneH, includeSwimmers) {
  const LANES = 5, t = frameCount;
  const wg = ctx.createLinearGradient(0, padY, 0, padY + poolH);
  wg.addColorStop(0, '#0096b8'); wg.addColorStop(1, '#006a8e');
  ctx.fillStyle = wg; ctx.fillRect(startX, padY, poolW, poolH);
  ctx.strokeStyle = 'rgba(255,255,255,0.09)'; ctx.lineWidth = 1.5;
  for (let l = 0; l < LANES; l++) {
    const baseY = padY + l * laneH + laneH * 0.5;
    ctx.beginPath();
    for (let x = startX; x <= startX + poolW; x += 3) {
      const y = baseY + Math.sin(x / 25 + t * 0.06 + l * 1.3) * 2.5;
      x === startX ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.stroke();
  }
  for (let l = 1; l < LANES; l++) {
    const fy = padY + l * laneH;
    for (let x = startX + 6; x < startX + poolW - 4; x += 11) {
      ctx.beginPath(); ctx.arc(x, fy, 4, 0, Math.PI * 2);
      ctx.fillStyle = Math.floor((x - startX) / 11) % 2 === 0 ? '#e8a820' : '#fff';
      ctx.fill();
    }
  }
  ctx.strokeStyle = '#3a2a10'; ctx.lineWidth = 5;
  ctx.strokeRect(startX, padY, poolW, poolH);
  if (includeSwimmers) {
    for (let l = 0; l < LANES; l++) {
      drawPoolSwimmer(startX + 20, padY + l * laneH + laneH / 2, POOL_NPC_COLORS[l % 4], '', t);
    }
  }
}

function drawPoolScene() {
  if (poolPhase === 'none' || poolAlpha <= 0) return;
  const LANES = 5, finishX = W * 0.88, startX = W * 0.06;
  const padY = H * 0.13, poolH = H * 0.74, laneH = poolH / LANES;
  const t = frameCount;
  ctx.save(); ctx.globalAlpha = poolAlpha;
  poolLobbyBtns = [];

  // Deck tiles
  ctx.fillStyle = '#d5c9a4'; ctx.fillRect(0, 0, W, H);
  ctx.strokeStyle = 'rgba(160,145,80,0.2)'; ctx.lineWidth = 0.5;
  for (let x = 0; x < W; x += 28) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y = 0; y < H; y += 28) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

  // ─── LOBBY ───
  if (poolPhase === 'lobby') {
    drawPoolWater(startX, padY, finishX - startX, poolH, laneH, true);

    // Modal overlay
    const mw = 420, mh = poolLobbyPage === 'difficulty' ? 200 : poolLobbyPage === 'waiting' ? 230 : 190;

      ctx.fillText('选择难度', W/2, my + 28);
      const diffLabels = [['🌊 简单','#50c878','easy'], ['🚤 中等','#ffaa20','medium'], ['⚡ 困难','#ff4444','hard']];

      ctx.fillText('NPC悠闲游', mx+77, my+122);
      ctx.fillText('NPC节奏快', mx+207, my+122);
      ctx.fillText('NPC超速冲', mx+337, my+122);
      drawPoolLobbyBtn('← 返回', mx+20, my+mh-48, 90, 30, '#5588aa', 'back');
      drawPoolLobbyBtn('🚪 离开', mx+mw-110, my+mh-48, 90, 30, '#aa4444', 'leave');
    } else if (poolLobbyPage === 'waiting') {
      ctx.fillStyle = '#88ffaa'; ctx.font = 'bold 15px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText('👥 多人等待室', W/2, my + 28);
      ctx.fillStyle = '#aadfc8'; ctx.font = '12px sans-serif';
      ctx.fillText(`等待中的玩家 (${poolWaiters.length}/5)：`, W/2, my + 52);
      poolWaiters.slice(0, 5).forEach((w, i) => {
        ctx.fillStyle = w.color || '#aaddff';
        ctx.beginPath(); ctx.arc(mx + 36, my + 76 + i * 22, 6, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = myAgent && w.name === myAgent.name ? '#ffe066' : '#e0f4ff';
        ctx.font = `${myAgent && w.name === myAgent.name ? 'bold ' : ''}12px sans-serif`;
        ctx.textAlign = 'left';
        ctx.fillText(w.name + (myAgent && w.name === myAgent.name ? ' (你)' : ''), mx + 50, my + 81 + i * 22);
        ctx.textAlign = 'center';
      });
      const secs = Math.max(0, 120 - Math.floor(poolWaitTimer / 60));
      ctx.fillStyle = '#7aa8cc'; ctx.font = '11px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText(poolWaiters.length >= 2 ? '准备好了可以开始！' : `等待更多玩家... ${secs}s`, W/2, my + mh - 60);
      const canStart = poolWaiters.length >= 2;
      if (canStart) drawPoolLobbyBtn('🚀 开始比赛！', mx + 20, my+mh-48, 175, 32, '#00ff88', 'multi_start');

  if (poolPhase === 'countdown') {

    ctx.font = 'bold 88px monospace'; ctx.textAlign = 'center';
    ctx.fillText(label, W/2, H/2+30);
  } else if (poolPhase === 'racing') {

function drawPoolSwimmer(x, y, color, name, t, isPlayer = false) {
  const bob = Math.sin(t * 0.18 + x * 0.05) * 1.5;
  // Cap
  ctx.fillStyle = isPlayer ? '#fff' : '#ddd';
  ctx.beginPath(); ctx.ellipse(x, y + bob - 8, 6, 5, 0, 0, Math.PI * 2); ctx.fill();
  // Body (top-down oval)
  ctx.fillStyle = color;
  ctx.beginPath(); ctx.ellipse(x, y + bob, 10, 7, 0, 0, Math.PI * 2); ctx.fill();
  if (isPlayer) { ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5; ctx.stroke(); }
  // Arms splash
  const splashA = Math.sin(t * 0.22 + x * 0.08) * 0.5;
  ctx.strokeStyle = color; ctx.lineWidth = 2.5; ctx.globalAlpha *= 0.8;
  ctx.beginPath();
  ctx.moveTo(x - 8, y + bob); ctx.lineTo(x - 16 + splashA * 6, y + bob - 6);
  ctx.moveTo(x + 8, y + bob); ctx.lineTo(x + 16 - splashA * 6, y + bob + 6);
  ctx.stroke(); ctx.globalAlpha /= 0.8;
  // Name label
  ctx.fillStyle = isPlayer ? '#ffe066' : 'rgba(255,255,255,0.7)';
  ctx.font = `${isPlayer ? 'bold ' : ''}9px sans-serif`; ctx.textAlign = 'center';
  ctx.fillText(name, x, y + bob + 18);
}

function loop() {

    ctx.fillStyle='#08081a';ctx.fillRect(0,0,W,H);

    ctx.fillStyle='#FFD700';ctx.fillRect(W/2-120,H/2+8,240*(loadedCount/2),8);
    requestAnimationFrame(loop);return;
  }
  ctx.imageSmoothingEnabled=true;ctx.imageSmoothingQuality='high';
  if (currentMap === 'flower') {
    ctx.fillStyle='#7ba06a'; ctx.fillRect(0,0,W,H);
    if (treeBgImg.naturalWidth) {
      const sc = Math.max(W/treeBgImg.naturalWidth, H/treeBgImg.naturalHeight);
      const tw=treeBgImg.naturalWidth*sc, th=treeBgImg.naturalHeight*sc;

    }
  } else if (currentMap === 'prayer') {
    ctx.fillStyle='#2a1a0a'; ctx.fillRect(0,0,W,H);

      const pw=prayerBgImg.naturalWidth*sc, ph=prayerBgImg.naturalHeight*sc;
      ctx.drawImage(prayerBgImg,(W-pw)/2,(H-ph)/2,pw,ph);

  } else {
    ctx.drawImage(currentMap==='left' ? mapImg : mapImgR, 0, 0, W, H);
  }
  agents.forEach(updateAgent);

      currentMap = 'left';
      myAgent.x = W - TRANSITION_ZONE - 5;
      myAgent.targetX = W - TRANSITION_ZONE - 80;
      setStatus('🏘️ 回到小镇...');
    } else if (currentMap==='prayer' && myAgent.x <= TRANSITION_ZONE) {
      currentMap = 'right';
      myAgent.x = W - TRANSITION_ZONE - 5;
      myAgent.targetX = W - TRANSITION_ZONE - 80;
      setStatus('🌲 回到郊外区域...');
    } else if (currentMap==='left' && myAgent.x <= TRANSITION_ZONE) {
      currentMap = 'flower';
      myAgent.x = W - TRANSITION_ZONE - 5;
      myAgent.targetX = W - TRANSITION_ZONE - 80;
      setStatus('🌸 进入花树广场...');
    } else if (currentMap==='flower' && myAgent.x >= W - TRANSITION_ZONE) {
      currentMap = 'left';
      myAgent.x = TRANSITION_ZONE + 5;
      myAgent.targetX = TRANSITION_ZONE + 80;
      setStatus('🏘️ 回到小镇...');
    }
  }
  const all=[...agents,...[...remotePlayers.values()].map(rp=>({...rp,_isRemote:true}))];
  all.sort((a,b)=>a.y-b.y).forEach(a=>a._isRemote?drawRemotePlayer(a):drawAgent(a));
  drawWeather();
  drawGrassOverlay();
  drawStarsOverlay();

  updateTentTransition();
  updateFireTransition();
  updateFerrisTransition();
  updateStardeckTransition();
  updatePoolTransition();
  updateKtvTransition();
  updateGymTransition();

  if(myAgent&&socket&&frameCount%6===0) socket.emit('player:move',{x:myAgent.x,y:myAgent.y,state:myAgent.state});
  if(frameCount%8===0)  checkProximity();

// =============================================
// Socket.io
// =============================================
function initSocket() {
  socket=io();
  socket.on('connect',()=>{
    mySocketId=socket.id;
    if(myAgent) emitJoin(myAgent);
  });
  socket.on('players:all',(players)=>{
    remotePlayers.clear();
    players.forEach(p=>{ if(p.id!==mySocketId) remotePlayers.set(p.id,{...p,_f:0}); });
    updateOnlineCount(); renderCharList();
  });
  socket.on('player:join',(p)=>{
    if(p.id===mySocketId) return;
    remotePlayers.set(p.id,{...p,_f:0});
    updateOnlineCount(); renderCharList();
    setStatus(`🎉 ${p.name} 进入了小镇！`);
  });
  socket.on('player:move',({id,x,y,state})=>{
    const rp=remotePlayers.get(id);
    if(rp){rp.x=x;rp.y=y;rp.state=state;}
  });
  socket.on('player:special-update',({id,specialEnabled:se})=>{
    const rp=remotePlayers.get(id);
    if(rp) rp.specialEnabled=se;
  });
  socket.on('player:interaction',({id,interaction})=>{
    const rp=remotePlayers.get(id);
    if(rp) rp.interaction=interaction||null;
  });
  socket.on('player:leave',({id})=>{
    const rp=remotePlayers.get(id);
    if(rp) setStatus(`${rp.name} 离开了小镇`);
    remotePlayers.delete(id); updateOnlineCount(); renderCharList();
  });
  // 收到广播事件
  socket.on('event:receive',({charA,charB,loc,short,detail})=>{
    pushPublicEvent(charA,charB,loc,short||`${charA.name}与${charB.name}在${loc}相遇`);
    if(myAgent&&(myAgent.name===charA.name||myAgent.name===charB.name)){
      pushPrivateEvent(charA,charB,loc,detail||short||'');
    }
    setStatus('📜 新事件已记录！');
  });
  // 收到特殊任务
  socket.on('event:special-receive',({nameA,nameB,task})=>{
    if(myAgent&&(myAgent.name===nameA||myAgent.name===nameB)){
      pushSpecialEvent(nameA,nameB,task);
    }
  });
  // 新居民入镇
  socket.on('new:arrival',({name,dept})=>{
    showArrivalBanner([`${name}（${dept}）`]);
    setStatus(`🎉 欢迎 ${name} 首次加入小镇！`);
  });
  // 发言气泡
  socket.on('player:say',({id,name,text})=>{
    speechBubbles.set(id, {text, endTime: Date.now() + 5000});
    if (myAgent && name !== myAgent.name) setStatus(`💬 ${name}：${text}`);
  });
  // 便利贴更新
  socket.on('sticky:update',({venue,notes})=>{
    renderStickyNotes(venue, notes);
  });
  // 心愿条更新
  socket.on('wish:all', (data) => {
    renderWishes(data);
  });
}

function emitJoin(agent) {
  if(!socket||!socket.connected) return;
  socket.emit('player:join',{
    name:agent.name,dept:agent.dept,color:agent.color,
    pixelAttrs:agent.pixelAttrs,x:agent.x,y:agent.y,
    specialEnabled,
  });
}

// ── KTV 节奏大师键盘监听 ──
document.addEventListener('keydown', e => {
  if (ktvPhase !== 'inside') return;
  // Don't intercept if user is typing in an input
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  const laneMap = { d: 0, f: 1, j: 2, k: 3 };
  const lane = laneMap[e.key.toLowerCase()];
  if (lane === undefined) return;
  e.preventDefault();
  ktvLanePress[lane] = 14;
  const hitY = H * KTV_HIT_Y_RATIO;
  const win = 40;
  let best = null, bestDist = Infinity;
  for (const n of ktvNotes) {
    if (n.lane !== lane) continue;
    const dist = Math.abs(n.y - hitY);
    if (dist < win && dist < bestDist) { best = n; bestDist = dist; }
  }
  if (best) {
    ktvNotes = ktvNotes.filter(n => n !== best);
    ktvCombo++;
    let label, earn;
    if (bestDist < 10)      { label = 'PERFECT ✨'; earn = 20; }
    else if (bestDist < 22) { label = 'GREAT';     earn = 12; }
    else                    { label = 'GOOD';       earn = 6;  }
    const col = bestDist < 10 ? '#ffe566' : bestDist < 22 ? '#69f0ae' : '#88aaff';
    ktvHitFx.push({ lane, label, timer: 44, color: col, dy: 0 });
    ktvScore++;
    const bonus = Math.floor(ktvCombo / 5); // combo bonus
    earn += bonus;
    ktvCoins += earn;
    myAgent.money += earn;
    localStorage.setItem('kaon_money_' + myAgent.name, myAgent.money);
    syncMoneyToServer(); updateCharPanel(myAgent);
  } else {
    ktvHitFx.push({ lane, label: 'MISS', timer: 32, color: '#ff4444', dy: 0 });
    ktvCombo = 0;
  }
});

function drawSpeechBubbles() {
  const now = Date.now();
  const expired = [];
  for (const [id, bubble] of speechBubbles) {
    if (now > bubble.endTime) { expired.push(id); continue; }
    // Find player position
    let px, py;
    if (id === mySocketId || id === 'me') {
      if (!myAgent) continue;
      px = myAgent.x; py = myAgent.y;
    } else {
      const rp = remotePlayers.get(id);
      if (!rp) continue;
      px = rp.x; py = rp.y;
    }
    // Map offset (same logic as main draw loop)
    const alpha = Math.min(1, (bubble.endTime - now) / 1000);
    ctx.save(); ctx.globalAlpha = alpha;
    const text = bubble.text;
    ctx.font = '11px sans-serif';
    const maxW = 160;
    let textW = Math.min(ctx.measureText(text).width + 18, maxW + 18);
    const bh = 22, bx = px - textW/2, by = py - 62;
    // Bubble background
    ctx.fillStyle = 'rgba(255,255,255,0.93)';
    ctx.beginPath(); ctx.roundRect(bx, by, textW, bh, 5); ctx.fill();
    // Tail
    ctx.fillStyle = 'rgba(255,255,255,0.93)';
    ctx.beginPath(); ctx.moveTo(px-5,by+bh); ctx.lineTo(px+5,by+bh); ctx.lineTo(px,by+bh+6); ctx.closePath(); ctx.fill();
    // Text
    ctx.fillStyle = '#222'; ctx.textAlign = 'center';
    let disp = text;
    if (ctx.measureText(text).width > maxW) {
      while (ctx.measureText(disp+'…').width > maxW) disp = disp.slice(0,-1);
      disp += '…';
    }
    ctx.fillText(disp, px, by + 15);
    ctx.restore();
  }
  expired.forEach(id => speechBubbles.delete(id));
}

function updatePrayerOrbit() {
  if (prayerPhase !== 'orbiting' || !myAgent) return;
  // 生成飘字粒子（每90帧一次）
  prayerSpawnTimer++;
  if (prayerSpawnTimer >= 90) {
    prayerSpawnTimer = 0;
    const txt = PRAYER_BLESSINGS[Math.floor(Math.random() * PRAYER_BLESSINGS.length)];
    prayerParticles.push({ x: myAgent.x, y: myAgent.y - 36, text: txt, life: 70, maxLife: 70, dx: (Math.random()-.5)*0.6 });
  }
  // 更新粒子
  for (let i = prayerParticles.length - 1; i >= 0; i--) {
    const p = prayerParticles[i];
    p.y -= 0.7; p.x += p.dx; p.life--;
    if (p.life <= 0) prayerParticles.splice(i, 1);
  }
  // 出门按钮
  const ebw=140, ebh=30, ebx=W/2-70, eby=H-52;
  iBtnTent.x=ebx; iBtnTent.y=eby; iBtnTent.w=ebw; iBtnTent.h=ebh;
  ctx.save();
  ctx.fillStyle='rgba(20,10,0,0.88)'; ctx.beginPath(); ctx.roundRect(ebx,eby,ebw,ebh,6); ctx.fill();
  ctx.strokeStyle='#c8982a'; ctx.lineWidth=1.5; ctx.beginPath(); ctx.roundRect(ebx,eby,ebw,ebh,6); ctx.stroke();
  ctx.fillStyle='#f0c040'; ctx.font='bold 13px ZCOOL KuaiLe,cursive'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('🚪 离开转经轮', ebx+ebw/2, eby+ebh/2);
  ctx.restore();
}
function drawPrayerParticles() {
  if (prayerParticles.length === 0) return;
  ctx.save();
  ctx.font = 'bold 15px ZCOOL KuaiLe,cursive'; ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
  for (const p of prayerParticles) {
    const t = p.life / p.maxLife;
    ctx.globalAlpha = t;
    // 金色渐变描边
    ctx.strokeStyle = 'rgba(180,120,0,' + t + ')';
    ctx.lineWidth = 3;
    ctx.strokeText(p.text, p.x, p.y);
    ctx.fillStyle = `rgb(${Math.round(255)},${Math.round(220*t+160*(1-t))},${Math.round(30)})`;
    ctx.fillText(p.text, p.x, p.y);
  }
  ctx.restore();
}

function drawBlessingSlip() {
  if (!blessingSlip) return;
  blessingSlip.anim = Math.min(1, blessingSlip.anim + 0.06);
  const a = blessingSlip.anim;
  const sw = 320, sh = 420;
  const sx = (W - sw) / 2, sy = (H - sh) / 2 - 20 + (1 - a) * 30;
  ctx.save();
  ctx.globalAlpha = a;
  // 背景遮罩
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.fillRect(0, 0, W, H);
  // 签纸（和纸风格）
  const g = ctx.createLinearGradient(sx, sy, sx, sy + sh);
  g.addColorStop(0, '#fdf6e3'); g.addColorStop(1, '#f7e8c8');
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.roundRect(sx, sy, sw, sh, 12); ctx.fill();
  // 边框
  ctx.strokeStyle = '#c8a96e'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.roundRect(sx, sy, sw, sh, 12); ctx.stroke();
  // 内边框装饰
  ctx.strokeStyle = '#e0c88a'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.roundRect(sx+10, sy+10, sw-20, sh-20, 8); ctx.stroke();
  // 顶部红印章装饰
  ctx.fillStyle = '#c0392b';
  ctx.beginPath(); ctx.arc(sx + sw/2, sy + 38, 22, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.font = 'bold 14px serif'; ctx.textAlign = 'center';
  ctx.fillText('签', sx + sw/2, sy + 44);
  // 标题
  ctx.fillStyle = '#8b5e1a'; ctx.font = 'bold 18px serif';
  ctx.fillText('🌸 祈愿签', sx + sw/2, sy + 84);
  // 分隔线
  ctx.strokeStyle = '#d9b87a'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(sx+30, sy+96); ctx.lineTo(sx+sw-30, sy+96); ctx.stroke();
  // 正文（自动换行）
  ctx.fillStyle = '#3d2b0e'; ctx.font = '16px serif'; ctx.textAlign = 'center';
  const words = blessingSlip.text;
  const maxLineW = sw - 60, lineH = 28;
  const lines = [];
  let line = '';
  for (const ch of words) {
    if (ctx.measureText(line + ch).width > maxLineW) { lines.push(line); line = ch; }
    else line += ch;
  }
  if (line) lines.push(line);
  const textStartY = sy + 140;
  lines.forEach((l, i) => ctx.fillText(l, sx + sw/2, textStartY + i * lineH));
  // 底部装饰花纹
  ctx.fillStyle = '#c8a96e'; ctx.font = '20px serif';
  ctx.fillText('✦  ·  ✦  ·  ✦', sx + sw/2, sy + sh - 50);
  // 点击关闭提示
  ctx.fillStyle = '#a08040'; ctx.font = '13px sans-serif';
  ctx.fillText('点击任意处关闭', sx + sw/2, sy + sh - 22);
  ctx.restore();
}

document.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const sx = W / rect.width, sy = H / rect.height;
  mouseX = (e.clientX - rect.left) * sx;
  mouseY = (e.clientY - rect.top)  * sy;
  // spawn sparkle
  for (let i=0;i<2;i++) {
    sparkles.push({
      x: mouseX + (Math.random()-0.5)*6,
      y: mouseY + (Math.random()-0.5)*6,
      vx: (Math.random()-0.5)*1.8,
      vy: (Math.random()-0.5)*1.8 - 0.6,
      life: 1, maxLife: 22 + Math.random()*18,
      size: 4 + Math.random()*5,
      hue: 200 + Math.random()*160,
    });
  }
});

function drawCursor() {
  // update & draw sparkles
  for (let i = sparkles.length-1; i >= 0; i--) {
    const s = sparkles[i];
    s.x += s.vx; s.y += s.vy; s.vy += 0.04;
    s.life++;
    if (s.life > s.maxLife) { sparkles.splice(i, 1); continue; }
    const a = 1 - s.life/s.maxLife;
    const sz = s.size * a;
    ctx.save(); ctx.globalAlpha = a * 0.9;
    ctx.translate(s.x, s.y); ctx.rotate(s.life * 0.25);
    ctx.fillStyle = `hsl(${s.hue},100%,80%)`;
    // 4-point star shape
    ctx.beginPath();
    for (let p=0; p<8; p++) {
      const ang = p * Math.PI/4;
      const r = p%2===0 ? sz : sz*0.35;
      p===0 ? ctx.moveTo(Math.cos(ang)*r, Math.sin(ang)*r)
            : ctx.lineTo(Math.cos(ang)*r, Math.sin(ang)*r);
    }
    ctx.closePath(); ctx.fill();
    ctx.restore();
  }
  // draw main cursor star
  const t = frameCount * 0.08;
  ctx.save(); ctx.translate(mouseX, mouseY); ctx.rotate(t);
  ctx.fillStyle = '#fff'; ctx.globalAlpha = 0.95;
  ctx.beginPath();
  for (let p=0; p<8; p++) {
    const ang = p * Math.PI/4;
    const r = p%2===0 ? 7 : 3;
    p===0 ? ctx.moveTo(Math.cos(ang)*r, Math.sin(ang)*r)
          : ctx.lineTo(Math.cos(ang)*r, Math.sin(ang)*r);
  }
  ctx.closePath(); ctx.fill();
  // glow
  const g = ctx.createRadialGradient(0,0,0,0,0,10);
  g.addColorStop(0,'rgba(180,160,255,0.4)'); g.addColorStop(1,'transparent');
  ctx.fillStyle=g; ctx.beginPath(); ctx.arc(0,0,10,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

let _currentStickyVenue = null;
function openStickyPanel(venue, label) {
  _currentStickyVenue = venue;
  document.getElementById('stickyVenueName').textContent = label;
  document.getElementById('stickyPanel').classList.add('open');
  if (socket) socket.emit('sticky:get', { venue });
}
function closeStickyPanel() {
  document.getElementById('stickyPanel').classList.remove('open');
  _currentStickyVenue = null;
}
function hideStickyPanel() {
  closeStickyPanel();
}
function postSticky() {
  if (!_currentStickyVenue || !myAgent || !socket) return;
  const input = document.getElementById('stickyInput');
  const text = (input.value || '').trim();
  if (!text) return;
  input.value = '';
  socket.emit('sticky:post', { venue: _currentStickyVenue, author: myAgent.name, text });
}
function postStickyReply(noteId) {
  if (!_currentStickyVenue || !myAgent || !socket) return;
  const input = document.getElementById('reply-input-'+noteId);
  if (!input) return;
  const text = (input.value || '').trim();
  if (!text) return;
  input.value = '';
  socket.emit('sticky:reply', { venue: _currentStickyVenue, noteId, author: myAgent.name, text });
}
function renderStickyNotes(venue, notes) {
  if (venue !== _currentStickyVenue) return;
  const list = document.getElementById('stickyList');
  if (!list) return;
  if (!notes || notes.length === 0) {
    list.innerHTML = '<div style="color:#555;font-size:11px;text-align:center;padding:12px">暂无留言，来第一个发帖！</div>';
    return;
  }
  list.innerHTML = [...notes].reverse().map(note => {
    const ts = new Date(note.timestamp).toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
    const repliesHtml = note.replies.map(r =>
      `<div class="sc-reply"><span>${r.author}</span>：${escHtml(r.text)}</div>`
    ).join('');
    const isOwner = myAgent && myAgent.name === note.author;
    const delBtn = isOwner ? `<button class="sc-del-btn" onclick="deleteSticky('${note.id}')">删除</button>` : '';
    return `<div class="sticky-card">
      <div class="sc-author">${escHtml(note.author)} · ${ts}${delBtn}</div>
      <div class="sc-text">${escHtml(note.text)}</div>
      <div class="sc-replies">${repliesHtml}
        <div class="sc-reply-input">
          <input id="reply-input-${note.id}" type="text" placeholder="回复..." maxlength="40">
          <button onclick="postStickyReply('${note.id}')">回复</button>
        </div>
      </div>
    </div>`;
  }).join('');
  // Enter key for reply inputs
  list.querySelectorAll('.sc-reply-input input').forEach(inp => {
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') { const id = inp.id.replace('reply-input-',''); postStickyReply(id); } });
  });
}
function deleteSticky(noteId) {
  if (!socket || !myAgent) return;
  socket.emit('sticky:delete', { venue: _currentStickyVenue, noteId, author: myAgent.name });
}

function openWishPanel() {
  document.getElementById('wishPanel').classList.add('open');
  if (socket && myAgent) socket.emit('wish:get', { name: myAgent.name });
}
function closeWishPanel() {
  document.getElementById('wishPanel').classList.remove('open');
}
function postWish() {
  if (!socket || !myAgent) return;
  const inp = document.getElementById('wishInput');
  const text = (inp.value || '').trim();
  if (!text) return;
  inp.value = '';
  socket.emit('wish:post', { author: myAgent.name, text });
}
function deleteWish(id) {
  if (!socket || !myAgent) return;
  socket.emit('wish:delete', { author: myAgent.name, id });
}
function hideWish(id) {
  if (!socket || !myAgent) return;
  socket.emit('wish:hide', { author: myAgent.name, id });
}
function renderWishes(data) {
  const list = document.getElementById('wishList');
  if (!list) return;
  const myName = myAgent ? myAgent.name : '';
  const visible = data.filter(w => !w.hidden || w.author === myName);
  if (!visible.length) {
    list.innerHTML = '<div style="color:rgba(255,180,200,0.4);font-size:11px;text-align:center;padding:16px">🌸 还没有心愿，来第一个许愿吧</div>';
    return;
  }
  list.innerHTML = visible.map(w => {
    const isMe = w.author === myName;
    const ts = new Date(w.timestamp).toLocaleDateString('zh-CN',{month:'2-digit',day:'2-digit'});
    const actions = isMe ? `<div class="wish-strip-actions">
      <button class="wish-btn wish-btn-hide" onclick="hideWish('${w.id}')">${w.hidden?'👁 显示':'🙈 隐藏'}</button>
      <button class="wish-btn wish-btn-del" onclick="deleteWish('${w.id}')">🗑 删除</button>
    </div>` : '';
    return `<div class="wish-strip${w.hidden?' hidden-wish':''}">
      <div class="wish-strip-author"><span>${escHtml(w.author)}</span><span>${ts}${w.hidden?' · 已隐藏':''}</span></div>
      <div class="wish-strip-text">${escHtml(w.text)}</div>
      ${actions}
    </div>`;
  }).join('');
}
document.addEventListener('DOMContentLoaded', () => {
  const wi = document.getElementById('wishInput');
  if (wi) wi.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); postWish(); } });
});
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
// Enter key for sticky input
document.addEventListener('DOMContentLoaded', () => {
  const si = document.getElementById('stickyInput');
  if (si) si.addEventListener('keydown', e => { if (e.key === 'Enter') postSticky(); });
});

let bdayTimer=null;
async function checkBirthdays(playerName,playerBirthday){
  const today=getTodayMMDD();
  const bdays=new Set();
  CHAR_DATA.forEach(npc=>{if(npc.birthday===today)bdays.add(npc.name);});
  if(playerBirthday){
    const mmdd=playerBirthday.length>=5?playerBirthday.slice(5):playerBirthday;
    if(mmdd===today) bdays.add(playerName||'你');
  }
  try{const r=await fetch('/api/today-birthdays');const d=await r.json();if(d.birthdays)d.birthdays.forEach(n=>bdays.add(n));}catch(e){}
  if(bdays.size>0) showBirthdayBanner([...bdays]);
}
function showBirthdayBanner(names){
  const wishes=['生日快乐，愿你今天格外闪亮！🌟','愿所有美好都在今天涌来！✨','小镇因你更加热闹，生日快乐！🎊'];
  const wish=wishes[Math.floor(Math.random()*wishes.length)];
  document.getElementById('bday-text').innerHTML=`🎉🎂 今天是 <strong>${names.join('、')}</strong> 的生日！祝${names.length>1?'你们':'你'}${wish} 🎂🎉`;
  document.getElementById('bday-banner').classList.add('show');
  if(bdayTimer) clearTimeout(bdayTimer);
  bdayTimer=setTimeout(()=>hideBdayBanner(),12000);
}
function hideBdayBanner(){
  const b=document.getElementById('bday-banner');
  b.style.transition='opacity 0.8s';b.style.opacity='0';
  setTimeout(()=>{b.classList.remove('show');b.style.opacity='';b.style.transition='';},800);
}
setTimeout(()=>checkBirthdays(null,null),1500);

async function checkinUser(name,dept,birthday){
  try{
    const res=await fetch('/api/checkin',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,dept,birthday})});
    const data=await res.json();
    if(data.isNew&&socket){
      setTimeout(()=>socket.emit('player:new-arrival',{name,dept}),1200);
    }
  }catch(e){}
}

const bgm         = document.getElementById('bgm');
const bgmFire     = document.getElementById('bgm-fire');
const bgmStardeck = document.getElementById('bgm-stardeck');
const bgmTent     = document.getElementById('bgm-tent');
const bgmFerris   = document.getElementById('bgm-ferris');
let bgmMuted = false;
let currentBGM = bgm; // 追踪当前播放的音频

function startBGM() {
  bgm.volume = 0.35;
  bgm.play().catch(() => {});
}

function switchSceneBGM(target) {
  // target: bgm | bgmFire | bgmStardeck
  if (target === currentBGM) return;
  // 淡出当前，淡入新音频
  const prev = currentBGM;
  currentBGM = target;
  target.volume = 0;
  target.muted = bgmMuted;
  target.currentTime = 0;
  target.play().catch(() => {});
  // 简单渐变（50ms步进）
  let vol = 0;
  const fadeIn = setInterval(() => {
    vol = Math.min(0.35, vol + 0.035);
    if (!bgmMuted) target.volume = vol;
    if (vol >= 0.35) clearInterval(fadeIn);
  }, 50);
  let prevVol = prev.volume;
  const fadeOut = setInterval(() => {
    prevVol = Math.max(0, prevVol - 0.07);
    prev.volume = prevVol;
    if (prevVol <= 0) { prev.pause(); clearInterval(fadeOut); }
  }, 50);
}

function restoreMainBGM() {
  if (currentBGM === bgm) return;
  switchSceneBGM(bgm);
}

function toggleMute() {
  bgmMuted = !bgmMuted;
  [bgm, bgmFire, bgmStardeck, bgmTent, bgmFerris].forEach(a => a.muted = bgmMuted);
  const btn = document.getElementById('btn-mute');
  btn.textContent = bgmMuted ? '🔇 音乐' : '🔊 音乐';
  btn.classList.toggle('muted', bgmMuted);
}
// 浏览器要求用户交互后才能播放，进入小镇时启动
document.addEventListener('click', function startOnce() {
  startBGM();
  document.removeEventListener('click', startOnce);
}, { once: true });

// Socket 在捏人系统就绪后再初始化，避免 io 未定义时中断上面的代码
try { initSocket(); } catch(e) { console.warn('Socket 连接失败，单机模式运行:', e); }
</script>
