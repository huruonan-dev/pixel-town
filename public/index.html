<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>kaon小镇</title>
  <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
  <script src="/socket.io/socket.io.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, canvas, div, button, input, textarea, a, span, label, p, h1, h2, h3, select {
      cursor: none !important;
    }
    body {
      background: #08081a;
      display: flex; flex-direction: column; align-items: center;
      min-height: 100vh; font-family: 'ZCOOL KuaiLe', cursive;
      color: white; padding: 16px; overflow-x: auto;
    }
    * { cursor: none !important; }

    /* ===== 生日横幅 ===== */
    #bday-banner {
      position: fixed; top: 0; left: 0; right: 0; z-index: 99999;
      background: linear-gradient(90deg,#1a0040,#6a00cc,#ff2080,#ff9000,#ff2080,#6a00cc,#1a0040);
      background-size: 300% 100%;
      animation: bdaySlide 0.6s ease-out, bdayGradient 4s linear infinite;
      padding: 10px 48px 10px 16px; text-align: center; font-size: 15px;
      box-shadow: 0 4px 24px rgba(200,0,200,0.5); display: none;
    }
    #bday-banner.show { display: block; }
    @keyframes bdaySlide { from{transform:translateY(-100%);opacity:0} to{transform:translateY(0);opacity:1} }
    @keyframes bdayGradient { 0%{background-position:0% 50%} 100%{background-position:300% 50%} }
    .bday-text strong { color: #FFD700; font-size: 17px; }
    #bday-close {
      position:absolute; right:14px; top:50%; transform:translateY(-50%);
      background:none; border:none; color:rgba(255,255,255,0.6); font-size:20px; cursor:pointer;
    }

    /* ===== 新居民横幅 ===== */
    #arrival-banner {
      position: fixed; top: 0; left: 0; right: 0; z-index: 99998;
      background: linear-gradient(90deg,#003a1a,#006633,#00cc55,#FFD700,#00cc55,#006633,#003a1a);
      background-size: 300% 100%;
      animation: bdaySlide 0.6s ease-out, arrivalScroll 6s linear infinite;
      padding: 0; height: 36px; overflow: hidden; display: none;
      box-shadow: 0 4px 24px rgba(0,200,80,0.5);
    }
    #arrival-banner.show { display: block; }
    @keyframes arrivalScroll { 0%{background-position:0% 50%} 100%{background-position:300% 50%} }
    .arrival-ticker {
      display: inline-block; white-space: nowrap;
      animation: tickerMove 18s linear infinite;
      font-size: 14px; line-height: 36px; padding-left: 100%;
    }
    @keyframes tickerMove { from{transform:translateX(0)} to{transform:translateX(-100%)} }
    .arrival-ticker strong { color: #FFD700; font-size: 15px; }
    #arrival-close {
      position:absolute; right:14px; top:50%; transform:translateY(-50%);
      background:none; border:none; color:rgba(255,255,255,0.6); font-size:20px; cursor:pointer; z-index:1;
    }

    /* ===== 主布局 ===== */
    .container { display: flex; gap: 16px; align-items: flex-start; }
    .game-section { display: flex; flex-direction: column; gap: 8px; flex-shrink: 0; position:relative; }
    .game-title {
      text-align:center; font-size:26px; color:#FFD700;
      text-shadow:2px 2px #5a4000,0 0 20px rgba(255,215,0,0.3); letter-spacing:8px;
    }
    canvas#gameCanvas {
      border:3px solid #4a4a8a; border-radius:6px; display:block;
      image-rendering:pixelated; image-rendering:crisp-edges;
    }
    .info-bar {
      display:flex; align-items:center; justify-content:space-between;
      background:#12122a; border:1px solid #2a2a5a; border-radius:4px;
      padding:6px 14px; font-size:13px; gap:8px;
    }
    .weather-info { color:#ccc; }
    .status-bar  { color:#888; font-size:12px; flex:1; text-align:center; }
    .online-count { color:#00ddff; font-size:12px; white-space:nowrap; }
    .btn-reenter {
      font-family:'ZCOOL KuaiLe',cursive; font-size:12px;
      background:#1a1a40; border:1px solid #3a3a7a; border-radius:5px;
      color:#8888cc; padding:3px 10px; cursor:pointer; transition:all 0.2s;
    }
    .btn-reenter:hover { border-color:#6060cc; color:#aaaaee; }
    .btn-mute {
      font-family:'ZCOOL KuaiLe',cursive; font-size:12px;
      background:#1a1a40; border:1px solid #3a3a7a; border-radius:5px;
      color:#8888cc; padding:3px 10px; cursor:pointer; transition:all 0.2s;
    }
    .btn-mute:hover { border-color:#6060cc; color:#aaaaee; }
    .btn-mute.muted { color:#555588; border-color:#2a2a5a; }

    /* ===== 发言输入框 ===== */
    .speech-wrap { display:flex; align-items:center; gap:4px; }
    .speech-wrap input {
      background:rgba(0,0,0,0.6); border:1px solid #3a3a7a; border-radius:4px;
      color:#ccc; font-size:11px; padding:3px 7px; width:150px; outline:none;
      font-family:'ZCOOL KuaiLe',cursive;
    }
    .speech-wrap input:focus { border-color:#6060cc; }
    .speech-wrap input::placeholder { color:#444; }
    .speech-wrap button {
      background:#1a1a40; border:1px solid #3a3a7a; border-radius:4px;
      color:#8888cc; font-size:11px; padding:3px 7px; cursor:pointer;
    }
    .speech-wrap button:hover { border-color:#6060cc; color:#aaa; }

    /* ===== 便利贴面板 ===== */
    .sticky-overlay {
      display:none; position:absolute; right:4px; top:30px; width:220px; max-height:340px;
      background:rgba(10,8,28,0.97); border:1px solid #4a4a8a; border-radius:8px;
      z-index:50; flex-direction:column; overflow:hidden;
      box-shadow:0 4px 18px rgba(0,0,0,0.7);
    }
    .sticky-overlay.open { display:flex; }
    .sticky-hdr {
      background:#12103a; padding:7px 10px 5px; font-size:12px; color:#aaa8e0;
      border-bottom:1px solid #2a2a5a; display:flex; justify-content:space-between; align-items:center;
      font-family:'ZCOOL KuaiLe',cursive;
    }
    .sticky-hdr button { background:none; border:none; color:#555; cursor:pointer; font-size:13px; }
    .sticky-list { flex:1; overflow-y:auto; padding:6px 8px; display:flex; flex-direction:column; gap:6px; }
    .sticky-list::-webkit-scrollbar { width:4px; }
    .sticky-list::-webkit-scrollbar-thumb { background:#2a2a5a; border-radius:2px; }
    .sticky-card {
      background:rgba(255,245,150,0.08); border:1px solid #3a357a; border-radius:5px;
      padding:5px 7px; font-size:11px; color:#ccc;
    }
    .sticky-card .sc-author { color:#e0c060; font-size:10px; margin-bottom:2px; display:flex; justify-content:space-between; align-items:center; }
    .sc-del-btn { background:none; border:none; color:#884444; font-size:10px; cursor:pointer !important; padding:0; }
    .sc-del-btn:hover { color:#ff6666; }

    /* ===== 心愿条面板 ===== */
    .wish-panel {
      display:none; position:absolute; right:4px; top:30px; width:260px; max-height:460px;
      background:linear-gradient(160deg,#1a0a2e,#2a0e1a);
      border:1px solid rgba(255,180,200,0.4); border-radius:12px;
      z-index:55; flex-direction:column; overflow:hidden;
      box-shadow:0 6px 32px rgba(120,0,60,0.6);
    }
    .wish-panel.open { display:flex; }
    .wish-panel-hdr {
      display:flex; justify-content:space-between; align-items:center;
      padding:8px 12px; background:rgba(255,150,180,0.15);
      color:#ffb6c8; font-size:13px; font-weight:bold;
      border-bottom:1px solid rgba(255,150,180,0.2);
    }
    .wish-panel-hdr button { background:none; border:none; color:#aa7788; font-size:14px; cursor:pointer !important; }
    .wish-write-area { padding:10px 12px 6px; display:flex; flex-direction:column; gap:6px; }
    .wish-paper {
      background:linear-gradient(135deg,#fff9f0,#fff3e8);
      border-radius:6px; padding:8px; border:1px solid rgba(200,150,100,0.5);
      box-shadow:inset 0 1px 4px rgba(150,80,30,0.15);
      position:relative;
    }
    .wish-paper::before {
      content:''; position:absolute; top:0; left:0; right:0; bottom:0;
      background:repeating-linear-gradient(transparent, transparent 22px, rgba(180,140,100,0.15) 22px, rgba(180,140,100,0.15) 23px);
      border-radius:6px; pointer-events:none;
    }
    .wish-paper textarea {
      width:100%; border:none; background:transparent; resize:none; height:62px;
      font-family:'ZCOOL KuaiLe',cursive; font-size:13px; color:#3a1a0a;
      outline:none; position:relative; z-index:1; line-height:23px;
      cursor:text !important;
    }
    .wish-submit-btn {
      background:linear-gradient(135deg,#7a1a3a,#b03060); border:none; border-radius:20px;
      color:#ffe0ea; font-size:12px; padding:6px 0; cursor:pointer !important;
      font-family:'ZCOOL KuaiLe',cursive; letter-spacing:1px;
      transition:filter 0.2s;
    }
    .wish-submit-btn:hover { filter:brightness(1.2); }
    .wish-divider { text-align:center; color:rgba(255,180,200,0.5); font-size:10px; padding:4px 0; }
    .wish-list { flex:1; overflow-y:auto; padding:4px 10px 10px; display:flex; flex-direction:column; gap:6px; }
    .wish-strip {
      background:linear-gradient(135deg, #fff8e8, #ffecd8);
      border-radius:4px; padding:7px 10px 6px;
      border-left:3px solid #e08060;
      box-shadow:1px 2px 6px rgba(0,0,0,0.3);
      position:relative;
    }
    .wish-strip.hidden-wish { opacity:0.45; border-left-color:#666; background:linear-gradient(135deg,#2a2a2a,#222); }
    .wish-strip.hidden-wish .wish-strip-text { color:#777; }
    .wish-strip-author { font-size:10px; color:#b06040; margin-bottom:3px; display:flex; justify-content:space-between; }
    .wish-strip-text { font-size:12px; color:#3a1a08; line-height:1.5; word-break:break-all; font-family:'ZCOOL KuaiLe',cursive; }
    .wish-strip-actions { display:flex; gap:6px; margin-top:4px; }
    .wish-btn { background:none; border:none; font-size:10px; cursor:pointer !important; padding:0; }
    .wish-btn-del { color:#993333; }
    .wish-btn-del:hover { color:#ff5555; }
    .wish-btn-hide { color:#666; }
    .wish-btn-hide:hover { color:#aaa; }
    .sticky-card .sc-text { color:#ddd; line-height:1.4; word-break:break-all; }
    .sticky-card .sc-replies { margin-top:4px; padding-top:4px; border-top:1px solid #2a2a4a; }
    .sticky-card .sc-reply { font-size:10px; color:#aaa; margin:2px 0; }
    .sticky-card .sc-reply span { color:#b8b0e8; }
    .sticky-card .sc-reply-input {
      display:flex; gap:3px; margin-top:4px;
    }
    .sticky-card .sc-reply-input input {
      flex:1; background:rgba(0,0,0,0.4); border:1px solid #2a2a5a; border-radius:3px;
      color:#bbb; font-size:10px; padding:2px 5px; outline:none;
    }
    .sticky-card .sc-reply-input button {
      background:#1a1a3a; border:1px solid #3a3a7a; border-radius:3px;
      color:#888; font-size:10px; padding:2px 5px; cursor:pointer;
    }
    .sticky-footer { padding:6px 8px; border-top:1px solid #2a2a5a; display:flex; gap:4px; }
    .sticky-footer input {
      flex:1; background:rgba(0,0,0,0.5); border:1px solid #3a3a7a; border-radius:4px;
      color:#ccc; font-size:11px; padding:3px 7px; outline:none;
    }
    .sticky-footer input:focus { border-color:#6060cc; }
    .sticky-footer button {
      background:#2a2050; border:1px solid #5050aa; border-radius:4px;
      color:#aaa8e0; font-size:11px; padding:3px 9px; cursor:pointer;
    }
    .sticky-footer button:hover { background:#3a2878; }

    /* ===== 右侧公告区 ===== */
    .bulletin-section { width:340px; flex-shrink:0; display:flex; flex-direction:column; gap:10px; }

    /* 三栏 tab */
    .board-tabs {
      display:flex; gap:0; border-radius:8px 8px 0 0; overflow:hidden;
      border:2px solid #4a4a8a; border-bottom:none;
    }
    .board-tab {
      flex:1; font-family:'ZCOOL KuaiLe',cursive; font-size:13px;
      padding:9px 0; border:none; cursor:pointer; letter-spacing:1px;
      background:#0d0d26; color:#5555aa; transition:all 0.18s; text-align:center;
    }
    .board-tab.active { background:#1a1a40; color:#FFD700; }
    .board-tab:hover:not(.active) { background:#141430; color:#9999cc; }

    /* 公告板 */
    .board-panels {
      background:#0a0a1e; border:2px solid #2a2a5e; border-radius:0 0 6px 6px;
      height:420px; position:relative; overflow:hidden;
    }
    .board-panel {
      position:absolute; inset:0; overflow-y:auto; padding:10px;
      display:none; flex-direction:column; gap:0;
    }
    .board-panel.active { display:flex; }
    .board-panel::-webkit-scrollbar { width:5px; }
    .board-panel::-webkit-scrollbar-track { background:#0a0a1e; }
    .board-panel::-webkit-scrollbar-thumb { background:#3a3a7a; border-radius:3px; }

    /* 公共事件卡片（简短） */
    .pub-card {
      display:flex; align-items:baseline; gap:6px;
      padding:5px 4px; border-bottom:1px solid #1a1a3a; font-size:12px;
    }
    .pub-card:last-child { border-bottom:none; }
    .pub-time { color:#333; font-size:10px; flex-shrink:0; }
    .pub-text { color:#b0b0cc; line-height:1.5; word-break:break-all; }
    .pub-dot  { width:5px; height:5px; border-radius:50%; flex-shrink:0; margin-top:4px; }

    /* 私人事件卡片 */
    .priv-card {
      background:#141430; border:1px solid #3a3a7a; border-radius:6px;
      padding:10px; margin-bottom:8px;
    }
    .priv-card:first-child { border-color:#6a6aaa; background:#1a1a3e; }
    .priv-header { display:flex; justify-content:space-between; align-items:flex-start; gap:8px; margin-bottom:4px; }
    .priv-chars  { font-size:12px; line-height:1.5; flex:1; }
    .priv-time   { color:#555; font-size:10px; flex-shrink:0; }
    .priv-loc    { color:#FFD700; font-size:10px; margin-bottom:6px; }
    .priv-body   { color:#c0c0de; font-size:12px; line-height:1.8; word-break:break-word; }

    /* 特殊任务面板 */
    .special-toggle-row {
      display:flex; align-items:center; gap:10px;
      padding:10px 12px; background:#0f0f28;
      border-bottom:1px solid #2a2a4a;
    }
    .toggle-label { font-size:13px; color:#aaaacc; flex:1; }
    .toggle-sub   { font-size:10px; color:#444466; margin-top:1px; }
    /* iOS 风格开关 */
    .toggle-switch { position:relative; width:40px; height:22px; flex-shrink:0; }
    .toggle-switch input { opacity:0; width:0; height:0; }
    .toggle-slider {
      position:absolute; inset:0; border-radius:22px;
      background:#2a2a5a; cursor:pointer; transition:background 0.25s;
    }
    .toggle-slider::before {
      content:''; position:absolute; width:16px; height:16px;
      border-radius:50%; background:white; top:3px; left:3px;
      transition:transform 0.25s;
    }
    .toggle-switch input:checked + .toggle-slider { background:#5050cc; }
    .toggle-switch input:checked + .toggle-slider::before { transform:translateX(18px); }

    .special-body { padding:10px; overflow-y:auto; flex:1; }
    .special-empty { color:#333; text-align:center; padding:30px 0; font-size:13px; line-height:2.4; }
    .special-card {
      background:#141430; border:1px solid #5a3a8a; border-radius:8px; padding:12px;
      margin-bottom:10px;
    }
    .special-card-header { font-size:12px; color:#aa88ee; margin-bottom:6px; }
    .special-task-text { color:#e0d0ff; font-size:14px; line-height:1.8; }
    .special-with { color:#7060aa; font-size:11px; margin-top:6px; }
    .special-done { color:#4ade80; font-size:11px; margin-top:6px; }
    .special-done-btn { margin-top:8px; padding:5px 14px; background:#1a3020; border:1px solid #4ade80; border-radius:5px; color:#4ade80; font-size:12px; cursor:pointer; }
    .special-done-btn:hover:not(:disabled) { background:#243a28; }
    .special-done-btn:disabled { background:#151e16; color:#3a7048; cursor:default; border-color:#2a5035; }
    .special-reward-hint { color:#3a6a50; font-size:10px; display:block; margin-top:4px; }
    .special-off-hint { color:#2a2a55; text-align:center; padding:30px 12px; font-size:12px; line-height:2.2; }
    .rank-card { background:#0e0c1a; border:1px solid #2a2050; border-radius:6px; padding:8px 10px; margin-bottom:6px; display:flex; align-items:center; gap:8px; }
    .rank-medal { font-size:15px; width:22px; text-align:center; }
    .rank-name { color:#e0d0ff; font-size:13px; flex:1; font-family:monospace; }
    .rank-dept { color:#5a4880; font-size:11px; }
    .rank-money { color:#facc15; font-size:13px; font-weight:bold; white-space:nowrap; }
    .rank-header-bar { color:#6a5a90; font-size:11px; text-align:center; padding:6px 0 4px; border-bottom:1px solid #1a1530; margin-bottom:4px; }

    /* 空状态 */
    .board-empty { color:#333; text-align:center; padding:40px 0; font-size:14px; line-height:3; }

    /* ===== 奇遇事件卡片 ===== */
    .adv-card {
      background:#180f2a; border:1px solid #7a3aaa; border-radius:8px;
      padding:10px 12px; margin-bottom:8px;
    }
    .adv-card:first-child { border-color:#cc66ff; background:#1e1040; }
    .adv-header { display:flex; justify-content:space-between; margin-bottom:4px; }
    .adv-icon   { font-size:16px; }
    .adv-time   { color:#555; font-size:10px; }
    .adv-loc    { color:#cc88ff; font-size:10px; margin-bottom:5px; }
    .adv-body   { color:#e0c8ff; font-size:12px; line-height:1.8; }
    .adv-effect { font-size:11px; margin-top:6px; padding:4px 8px; border-radius:4px; background:#0d0820; }
    .adv-effect.pos { color:#4ade80; }
    .adv-effect.neg { color:#f87171; }

    /* ===== 角色面板 ===== */
    #char-panel {
      background:#0a0a1e; border:2px solid #2a2a5e; border-radius:8px;
      overflow:hidden; transition:all 0.3s;
    }
    .panel-header {
      display:flex; align-items:center; justify-content:space-between;
      padding:8px 12px; background:#0f0f28; border-bottom:1px solid #1a1a40;
    }
    .panel-title { font-size:13px; color:#FFD700; letter-spacing:1px; }
    .panel-toggle {
      background:none; border:1px solid #3a3a6a; border-radius:4px;
      color:#6666aa; font-size:11px; cursor:pointer; padding:2px 7px;
    }
    .panel-toggle:hover { border-color:#6060cc; color:#aaaaee; }
    .panel-body { padding:10px 12px; display:flex; gap:12px; align-items:flex-start; }
    .panel-body.hidden { display:none; }
    #char-panel-canvas {
      image-rendering:pixelated; border:1px solid #3a3a6a; border-radius:6px;
      background:#161636; width:64px; height:64px; display:block; flex-shrink:0;
    }
    .panel-info { flex:1; display:flex; flex-direction:column; gap:3px; }
    .panel-info-row { display:flex; gap:6px; align-items:baseline; }
    .panel-info-label { font-size:10px; color:#555588; width:28px; flex-shrink:0; }
    .panel-info-val   { font-size:12px; color:#c8c8e8; }
    /* 状态栏 */
    .status-stats { display:flex; flex-direction:column; gap:4px; margin-top:4px; }
    .stat-row { display:flex; align-items:center; gap:6px; }
    .stat-label { font-size:10px; color:#555588; width:28px; }
    .stat-bar-bg { flex:1; height:6px; background:#1a1a3a; border-radius:3px; overflow:hidden; }
    .stat-bar-fill { height:100%; border-radius:3px; transition:width 0.5s; }
    .stat-val { font-size:10px; color:#8888bb; width:28px; text-align:right; }

    /* ===== 面板折叠按钮（通用） ===== */
    .section-header {
      display:flex; align-items:center; justify-content:space-between;
      padding:6px 10px 4px;
    }
    .section-label { font-size:12px; color:#555588; }
    .collapse-btn {
      background:none; border:1px solid #2a2a5a; border-radius:4px;
      color:#555588; font-size:11px; cursor:pointer; padding:1px 7px;
    }
    .collapse-btn:hover { border-color:#5050aa; color:#9090cc; }
    .collapsible { transition:all 0.25s; }
    .collapsible.collapsed { display:none; }

    /* 居民列表 */
    .char-list { background:#0a0a1e; border:2px solid #2a2a5e; border-radius:6px; padding:12px; }
    .char-list-title { font-size:13px; color:#666; margin-bottom:8px; }
    .char-grid { display:grid; grid-template-columns:1fr 1fr; gap:3px 8px; }
    .char-item { display:flex; align-items:center; gap:6px; padding:3px 0; }
    .char-dot  { width:8px; height:8px; border-radius:2px; flex-shrink:0; }
    .char-name { font-size:12px; flex:1; }
    .char-name.is-player { color:#FFD700; }
    .char-name.is-remote { color:#00ddff; }
    .char-dept   { color:#444; font-size:10px; }
    .char-status { font-size:11px; }

    /* ===== 创建页 ===== */
    #create-overlay {
      position:fixed; inset:0;
      background:radial-gradient(ellipse at 60% 40%,#1a1050 0%,#08081a 70%);
      display:flex; align-items:flex-start; justify-content:center;
      z-index:9999; transition:opacity 0.6s ease; overflow-y:auto; padding:20px 16px 40px;
    }
    #create-overlay.fade-out { opacity:0; pointer-events:none; }
    .create-box {

  <div class="bulletin-section">

        <div class="panel-info" id="char-panel-info">
          <div style="color:#444;font-size:12px">进入小镇后显示</div>

    <!-- Tab 切换 -->
    <div class="board-tabs">
      <button class="board-tab active" id="tab-pub"     onclick="switchTab('pub')">📢 公共</button>
      <button class="board-tab"        id="tab-priv"    onclick="switchTab('priv')">📨 私信</button>
      <button class="board-tab"        id="tab-adv"     onclick="switchTab('adv')">🎲 奇遇</button>
      <button class="board-tab"        id="tab-special" onclick="switchTab('special')">✨ 特殊</button>
      <button class="board-tab"        id="tab-rank"    onclick="switchTab('rank')">🏆 排行</button>

    <!-- 四个面板 -->

<script>
// =============================================
// 画布 & 常量
// =============================================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const MAP_W = 1408, MAP_H = 768, SCALE = 0.73;
const W = Math.round(MAP_W * SCALE), H = Math.round(MAP_H * SCALE);
canvas.width = W; canvas.height = H;

const mapImg    = new Image(); mapImg.src = 'assets/map_full.png';
const mapImgR   = new Image(); mapImgR.src = 'assets/map_right.png';
const charSheet = new Image(); charSheet.src = 'assets/characters/roguelikeChar_transparent.png';
const ktvBgImg  = new Image(); ktvBgImg.src = 'assets/ktv_bg.png';
const smBgImg   = new Image(); smBgImg.src  = 'assets/sm_bg.png';
const bgBgImg   = new Image(); bgBgImg.src  = 'assets/bg_bg.png';
const treeBgImg   = new Image(); treeBgImg.src   = 'assets/tree_bg.png';
const gymBgImg    = new Image(); gymBgImg.src    = 'assets/gym_bg.png';
const prayerBgImg = new Image(); prayerBgImg.src = 'assets/prayer_bg.png';
let loadedCount = 0, gameReady = false;
function onLoad() {
  if (++loadedCount >= 3) {
    gameReady = true;
    document.getElementById('statusBar').textContent = '小镇居民们开始了新的一天...';
    renderCharList();
  }
}
mapImg.onload = onLoad; mapImg.onerror = onLoad;
mapImgR.onload = onLoad; mapImgR.onerror = onLoad;
charSheet.onload = onLoad; charSheet.onerror = onLoad;

// 当前地图：'left' | 'right' | 'flower' | 'prayer'
let currentMap = 'left';
// 转经轮地图常量
const PRAYER_CX = 468, PRAYER_CY = 232, PRAYER_ORBIT_R = 88;
const PRAYER_BLESSINGS = ['功德+1','智慧+1','健康+1','好运+1','财富+1'];
const TRANSITION_ZONE = 30;

// ===== 点击移动 =====
let manualMode = false; // true = 手动控制，停止自动游走
let lastClickTime = 0;

canvas.addEventListener('click', (e) => {
  const now = Date.now();
  if (now - lastClickTime < 300) return; // 忽略双击的第一次 click
  lastClickTime = now;
  if (!myAgent) return;
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width, scaleY = H / rect.height;
  const cx = (e.clientX - rect.left) * scaleX;
  const cy = (e.clientY - rect.top)  * scaleY;

  // 祈愿签：点击任意处关闭
  if (blessingSlip) { blessingSlip = null; return; }

  // 游泳池
  if (poolPhase !== 'none') {
    if (poolPhase === 'lobby') {
      for (const btn of poolLobbyBtns) {
        if (cx >= btn.x && cx <= btn.x+btn.w && cy >= btn.y && cy <= btn.y+btn.h) {
          poolHandleLobbyClick(btn.action); break;
        }
      }
    } else if (poolPhase === 'racing') {
      if (cx >= iBtnTent.x && cx <= iBtnTent.x+iBtnTent.w && cy >= iBtnTent.y && cy <= iBtnTent.y+iBtnTent.h) {
        poolPhase = 'leaving'; setStatus('🏊 离开泳池...');
      } else {
        poolPlayerX = Math.min(W * 0.88, poolPlayerX + 8);
      }
    } else if (poolPhase === 'finished') {
      if (cx >= iBtnTent.x && cx <= iBtnTent.x+iBtnTent.w && cy >= iBtnTent.y && cy <= iBtnTent.y+iBtnTent.h) {
        poolPhase = 'leaving'; setStatus('🏊 离开泳池...');
      }
    }
    return;
  }
  // KTV：节奏游戏用键盘控制，点击仅处理退出
  if (ktvPhase === 'inside') {
    if (cx >= iBtnTent.x && cx <= iBtnTent.x+iBtnTent.w && cy >= iBtnTent.y && cy <= iBtnTent.y+iBtnTent.h)
      ktvPhase = 'leaving';
    return;
  }
  // 健身房：点击出门
  if (gymPhase === 'inside') {
    if (cx >= iBtnTent.x && cx <= iBtnTent.x+iBtnTent.w && cy >= iBtnTent.y && cy <= iBtnTent.y+iBtnTent.h) {
      gymPhase = 'leaving'; setStatus('🏋️ 离开健身房...'); hideStickyPanel();
    }
    return;
  }
  // 篮球场：点击出门
  if (bbPhase === 'inside') {
    if (cx >= iBtnTent.x && cx <= iBtnTent.x+iBtnTent.w && cy >= iBtnTent.y && cy <= iBtnTent.y+iBtnTent.h) {
      bbPhase = 'leaving'; setStatus('🏀 离开球场...');
    }
    return;
  }
  // 桌游店：点击出门
  if (bgPhase === 'inside') {
    if (cx >= iBtnTent.x && cx <= iBtnTent.x+iBtnTent.w && cy >= iBtnTent.y && cy <= iBtnTent.y+iBtnTent.h) {
      bgPhase = 'leaving'; setStatus('🎲 离开桌游店...'); hideStickyPanel();
    }
    return;
  }
  // 酒吧：点击出门
  if (barPhase === 'inside') {
    if (cx >= iBtnTent.x && cx <= iBtnTent.x+iBtnTent.w && cy >= iBtnTent.y && cy <= iBtnTent.y+iBtnTent.h) {
      barPhase = 'leaving'; setStatus('🍸 离开酒吧...');
    }
    return;
  }
  // 剧本杀：仅展示场景（便利贴通过HTML面板操作）
  if (smPhase === 'inside') {
    if (cx >= iBtnTent.x && cx <= iBtnTent.x+iBtnTent.w && cy >= iBtnTent.y && cy <= iBtnTent.y+iBtnTent.h) {
      smPhase = 'leaving'; setStatus('🕵️ 离开剧本杀...'); hideStickyPanel();
    }
    return;
  }
  // 转经轮：点击出门
  if (prayerPhase === 'orbiting') {
    if (cx >= iBtnTent.x && cx <= iBtnTent.x+iBtnTent.w && cy >= iBtnTent.y && cy <= iBtnTent.y+iBtnTent.h) {
      prayerPhase = 'none'; prayerParticles = [];
      activeInteraction = null; manualMode = false; pickTarget(myAgent);
      if (socket) socket.emit('player:interaction', { id: null });
      setStatus('🙏 离开转经轮...');
    }
    return;
  }
  // 场景内出门按钮（帐篷/篝火/摩天轮/观星台共用 iBtnTent 区域）
  if ((tentPhase!=='none'||firePhase!=='none'||ferrisPhase!=='none'||stardeckPhase!=='none'||
       ktvPhase!=='none'||gymPhase!=='none'||bbPhase!=='none'||bgPhase!=='none'||
       barPhase!=='none'||smPhase!=='none') &&
      cx >= iBtnTent.x && cx <= iBtnTent.x + iBtnTent.w &&
      cy >= iBtnTent.y && cy <= iBtnTent.y + iBtnTent.h) {
    if (tentPhase !== 'none')     { tentPhase = 'leaving';     setStatus('🚪 离开帐篷...'); }
    if (firePhase !== 'none')     { firePhase = 'leaving';     setStatus('🚶 离开篝火...'); }
    if (ferrisPhase !== 'none')   { ferrisPhase = 'leaving';   setStatus('🎡 下车离开...'); }
    if (stardeckPhase !== 'none') { stardeckPhase = 'leaving'; setStatus('🔭 离开观星台...'); }
    if (ktvPhase !== 'none')      { ktvPhase = 'leaving';      setStatus('🎤 离开KTV...'); }
    if (gymPhase !== 'none')      { gymPhase = 'leaving';      setStatus('🏋️ 离开健身房...'); hideStickyPanel(); }
    if (bbPhase !== 'none')       { bbPhase = 'leaving';       setStatus('🏀 离开球场...'); }
    if (bgPhase !== 'none')       { bgPhase = 'leaving';       setStatus('🎲 离开桌游店...'); hideStickyPanel(); }
    if (barPhase !== 'none')      { barPhase = 'leaving';      setStatus('🍸 离开酒吧...'); }
    if (smPhase !== 'none')       { smPhase = 'leaving';       setStatus('🕵️ 离开剧本杀...'); hideStickyPanel(); }
    return;
  }
  // 互动按钮点击
  if (cx >= iBtn.x && cx <= iBtn.x + iBtn.w &&
      cy >= iBtn.y && cy <= iBtn.y + iBtn.h) {
    if (activeInteraction) {
      activeInteraction = null;
      manualMode = false; pickTarget(myAgent);
      if (socket) socket.emit('player:interaction', { id: null });
      setStatus('✅ 结束互动，恢复自动游走');
    } else if (nearInteractionObj) {
      activeInteraction = { ...nearInteractionObj, startFrame: frameCount };
      manualMode = true; myAgent.state = 'idle';
      if (nearInteractionObj.id === 'tent')     { tentPhase = 'entering';     tentAlpha = 0; }
      if (nearInteractionObj.id === 'fire')     { firePhase = 'entering';     fireAlpha = 0; }
      if (nearInteractionObj.id === 'ferris')   { ferrisPhase = 'entering';   ferrisAlpha = 0; ferrisRot = 0; }
      if (nearInteractionObj.id === 'stardeck') { stardeckPhase = 'entering'; stardeckAlpha = 0; }
      if (nearInteractionObj.id === 'pool')       { poolPhase = 'entering'; poolAlpha = 0; }
      if (nearInteractionObj.id === 'ktv')        { ktvPhase = 'entering'; ktvAlpha = 0; ktvCoins = 0; ktvNotes = []; ktvCombo = 0; ktvScore = 0; ktvHitFx = []; ktvLanePress = [0,0,0,0]; ktvNoteSpawnTimer = 0; }
      if (nearInteractionObj.id === 'gym')        { gymPhase = 'entering'; gymAlpha = 0; }
      if (nearInteractionObj.id === 'basketball') { bbPhase  = 'entering'; bbAlpha  = 0; bbPower = 0; bbScore = 0; bbCoins = 0; }
      if (nearInteractionObj.id === 'boardgame')  { bgPhase  = 'entering'; bgAlpha  = 0; bgCoins = 0; }
      if (nearInteractionObj.id === 'bar')         { barPhase = 'entering'; barAlpha = 0; barCoins = 0; barAdded = []; barTargetIdx = 0; barShakeAnim = 0; }
      if (nearInteractionObj.id === 'scriptmurder'){ smPhase  = 'entering'; smAlpha  = 0; }
      if (nearInteractionObj.id === 'prayerwheel') {
        activeInteraction = { ...nearInteractionObj, startFrame: frameCount };
        manualMode = true; myAgent.state = 'idle';
        prayerPhase = 'orbiting'; prayerAngle = Math.random() * Math.PI * 2;
        prayerParticles = []; prayerSpawnTimer = 0;
        if (socket) socket.emit('player:interaction', { id: 'prayerwheel' });
        setStatus('🙏 正在转经轮...');
        return;
      }
      if (nearInteractionObj.id === 'blessing') {
        blessingSlip = { text: BLESSINGS[Math.floor(Math.random() * BLESSINGS.length)], anim: 0 };
        activeInteraction = null; manualMode = false;
        return;
      }
      if (nearInteractionObj.id === 'wish') {
        openWishPanel();
        activeInteraction = null; manualMode = false;
        return;
      }
      if (socket) socket.emit('player:interaction', { id: nearInteractionObj.id });
      setStatus(`✨ 开始${nearInteractionObj.label.slice(2)}...`);
    }
    return;
  }

  manualMode = true;
  myAgent.targetX = Math.max(20, Math.min(W-20, cx));
  myAgent.targetY = Math.max(20, Math.min(H-20, cy));
  myAgent.state = 'walking';
  myAgent.idleTimer = 0;
  setStatus('🖱️ 点击移动中... 双击恢复自动游走');
});

  if (!myAgent) return;
  manualMode = false;
  pickTarget(myAgent);

});

function pickTarget(a) {
  let tx, ty;
  const spots = currentMap === 'right' ? SPOTS_RIGHT : SPOTS;
  if (currentMap === 'flower') { a.targetX = W/2 + (Math.random()-.5)*300; a.targetY = H/2 + (Math.random()-.5)*200; return; }
  if (currentMap === 'prayer') { a.targetX = W/2 + (Math.random()-.5)*400; a.targetY = H/2 + (Math.random()-.5)*200; return; }
  if (Math.random() < 0.6) {
    const s = spots[Math.floor(Math.random()*spots.length)];
    tx = s.x+(Math.random()-.5)*90; ty = s.y+(Math.random()-.5)*70;
  } else { tx = 30+Math.random()*(W-60); ty = 30+Math.random()*(H-60); }
  a.targetX = Math.max(20,Math.min(W-20,tx));
  a.targetY = Math.max(20,Math.min(H-20,ty));
}

function updateAgent(a) {
  a.frame++;
  if (a.state==='chatting') { if(--a.chatTimer<=0){a.state='idle';a.idleTimer=60+Math.random()*80;} return; }
  // 互动中
  if (a.isPlayer && activeInteraction) {
    if (activeInteraction.id === 'ferris') {
      // 乘摩天轮：随吊厢旋转
      const el = frameCount - activeInteraction.startFrame;
      const rot = el * 0.018 + Math.PI / 2; // 从底部开始
      a.x = FERRIS_CX + Math.cos(rot) * FERRIS_R;
      a.y = FERRIS_CY + Math.sin(rot) * FERRIS_R;
    } else if (activeInteraction.id === 'prayerwheel') {
      // 转经轮：围绕经轮轨道
      prayerAngle += 0.012;
      a.x = PRAYER_CX + Math.cos(prayerAngle) * PRAYER_ORBIT_R;
      a.y = PRAYER_CY + Math.sin(prayerAngle) * PRAYER_ORBIT_R * 0.55;
      a.state = 'walking';
      return;
    } else {
      a.x = activeInteraction.x; a.y = activeInteraction.y;
    }
    a.state = 'idle'; return;
  }
  // 手动模式：到达目标后停止，不再 pickTarget
  if (a.isPlayer && manualMode) {
    const dx=a.targetX-a.x, dy=a.targetY-a.y, dist=Math.sqrt(dx*dx+dy*dy);
    if (dist<4) { a.state='idle'; return; }
    a.state='walking';
    const spd = 1.5;
    a.x = Math.max(20,Math.min(W-20, a.x+(dx/dist)*spd));
    a.y = Math.max(20,Math.min(H-20, a.y+(dy/dist)*spd));
    return;
  }
  if (a.idleTimer>0) { a.idleTimer--; a.state='idle'; if(a.idleTimer<=0) pickTarget(a); return; }
  a.state = 'walking';
  const dx=a.targetX-a.x, dy=a.targetY-a.y, dist=Math.sqrt(dx*dx+dy*dy);
  if (dist<4) { a.state='idle'; a.idleTimer=80+Math.random()*120; return; }
  const spd = 1.3+Math.random()*0.4;
  a.x = Math.max(20,Math.min(W-20, a.x+(dx/dist)*spd));
  a.y = Math.max(20,Math.min(H-20, a.y+(dy/dist)*spd));
}

function shadeColor(hex, amt) {
  const c=v=>Math.max(0,Math.min(255,v));
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return '#'+[r,g,b].map(v=>c(v+amt).toString(16).padStart(2,'0')).join('');
}

function drawPixelChar(tc, attrs, cx, cy, dH) {
  const CH=24,CW=16, s=dH/CH;
  const ox=Math.round(cx-CW*s/2), oy=Math.round(cy-dH);
  const {hairColor='#1a0a00',hairStyle='short',skinTone='#e8b870',topColor='#4488cc',
         bottomColor='#334466',eyeColor='#1a1a1a',shoeColor='#222222',
         hasGlasses=false,accessory='none',accessoryColor='#333333'} = attrs;
  const hairDk=shadeColor(hairColor,-20),skinDk=shadeColor(skinTone,-25),
        topDk=shadeColor(topColor,-35),topLt=shadeColor(topColor,35),
        btmDk=shadeColor(bottomColor,-35),shoeDk=shadeColor(shoeColor,-30);
  const f=(col,row,w,h,color)=>{tc.fillStyle=color;tc.fillRect(ox+col*s,oy+row*s,w*s,h*s);};
  tc.imageSmoothingEnabled=false;
  if(accessory==='hat'){f(2,0,12,3,accessoryColor);f(1,2,14,1,shadeColor(accessoryColor,-20));f(3,0,10,1,shadeColor(accessoryColor,25));}
  if(accessory!=='hat'){f(3,0,10,1,hairDk);f(2,1,12,2,hairColor);}else{f(2,3,12,1,hairColor);}
  if(hairStyle==='long'){f(1,3,2,10,hairColor);f(13,3,2,10,hairColor);f(2,11,2,4,hairColor);f(12,11,2,4,hairColor);}
  else if(hairStyle==='medium'){f(1,3,2,6,hairColor);f(13,3,2,6,hairColor);}
  if(accessory==='hairband') f(2,2,12,1,accessoryColor);
  else if(accessory==='bow'){f(4,0,2,2,accessoryColor);f(9,0,2,2,accessoryColor);f(7,1,1,1,shadeColor(accessoryColor,40));}
  f(3,3,10,5,skinTone);f(3,3,1,5,skinDk);f(12,3,1,5,skinDk);
  f(4,3,2,1,hairDk);f(9,3,2,1,hairDk);
  f(4,4,2,1,'#ffffff');f(9,4,2,1,'#ffffff');
  f(5,5,1,1,eyeColor);f(10,5,1,1,eyeColor);
  f(5,4,1,1,'#ffffffcc');f(10,4,1,1,'#ffffffcc');
  f(7,6,1,1,skinDk);f(5,7,5,1,'#cc3333');f(6,7,3,1,'#ee6666');
  if(accessory==='mask'){f(3,6,10,3,'#e0e8f0');f(4,6,8,1,'#c8d4e0');f(3,7,10,1,'#c8d4e0');}
  if(hasGlasses||accessory==='glasses'||accessory==='sunglasses'){
    if(accessory==='sunglasses'){f(3,4,4,2,'rgba(20,20,40,0.85)');f(8,4,4,2,'rgba(20,20,40,0.85)');f(7,5,2,1,'rgba(20,20,40,0.7)');}
    else{tc.save();tc.strokeStyle='#444';tc.lineWidth=Math.max(1,s*0.55);
      tc.strokeRect(ox+3.5*s,oy+4*s,3*s,2.2*s);tc.strokeRect(ox+8.5*s,oy+4*s,3*s,2.2*s);
      tc.beginPath();tc.moveTo(ox+6.5*s,oy+5*s);tc.lineTo(ox+8.5*s,oy+5*s);tc.stroke();tc.restore();}
  }
  f(7,8,2,1,skinTone);
  f(3,9,10,5,topColor);f(3,9,1,5,topDk);f(12,9,1,5,topDk);f(4,9,3,1,topLt);
  f(1,9,2,4,topColor);f(13,9,2,4,topColor);f(1,13,2,1,skinTone);f(13,13,2,1,skinTone);
  f(3,14,10,6,bottomColor);f(3,14,1,6,btmDk);f(12,14,1,6,btmDk);f(7,14,2,6,btmDk);
  f(3,20,4,2,shoeColor);f(9,20,4,2,shoeColor);f(3,21,4,1,shoeDk);f(9,21,4,1,shoeDk);
  tc.fillStyle='rgba(0,0,0,0.15)';
  tc.beginPath();tc.ellipse(cx,oy+CH*s,CW*s*0.38,s*0.7,0,0,Math.PI*2);tc.fill();
}

const CS = 30;

function drawChatBubble(cx, topY) {
  ctx.fillStyle='rgba(255,255,255,0.92)';
  ctx.beginPath();ctx.roundRect(cx-14,topY-14,28,18,5);ctx.fill();
  ctx.font='12px sans-serif';ctx.textAlign='center';ctx.fillText('💬',cx,topY);
}
function drawNameTag(cx, topY, name, color, bg) {
  ctx.imageSmoothingEnabled=true;
  const nw=name.length*9+10;
  ctx.fillStyle=bg;ctx.fillRect(cx-nw/2,topY-2,nw,13);
  ctx.fillStyle=color;ctx.font='9px monospace';ctx.textAlign='center';ctx.fillText(name,cx,topY+9);
}

function drawAgent(a) {
  const cx=Math.round(a.x), cy=Math.round(a.y);
  const bounce=a.state==='walking'?Math.sin(a.frame*0.22)*2:0;
  const charH=a.isPlayer?40:CS, feetY=cy+bounce;
  if(a.state==='chatting') drawChatBubble(cx, feetY-charH);
  // 坐姿判断
  const isSitting = a.isPlayer && activeInteraction &&
    ['bench1','bench2','fire','stardeck'].includes(activeInteraction.id);
  if(a.isPlayer&&a.pixelAttrs){
    if(isSitting) drawPixelCharSitting(ctx,a.pixelAttrs,cx,feetY,charH*0.75);
    else drawPixelChar(ctx,a.pixelAttrs,cx,feetY,charH);
    ctx.save();ctx.strokeStyle='rgba(255,215,0,0.7)';ctx.lineWidth=1.5;ctx.setLineDash([3,2]);
    ctx.strokeRect(cx-charH*16/24/2-2,feetY-charH-2,charH*16/24+4,charH+4);ctx.restore();
    drawNameTag(cx,feetY-charH,a.name,'#FFD700','rgba(50,30,0,0.9)');
  } else {
    if(!charSheet.naturalWidth) return;
    ctx.fillStyle='rgba(0,0,0,0.20)';ctx.beginPath();ctx.ellipse(cx,feetY+2,CS/2+2,4,0,0,Math.PI*2);ctx.fill();
    ctx.imageSmoothingEnabled=false;
    ctx.drawImage(charSheet,a.sc*17,a.sr*17,16,16,cx-CS/2,feetY-CS,CS,CS);
    ctx.globalAlpha=0.28;ctx.fillStyle=a.color;ctx.fillRect(cx-CS/2,feetY-CS,CS,CS);ctx.globalAlpha=1;
    drawNameTag(cx,feetY-charH,a.name,'white','rgba(0,0,0,0.78)');
  }
}

const EVENT_R=72, EVENT_CD=900;
let activeAPICalls=0, frameCount=0;
const MAX_API=2;

function getLocName(x,y) {
  const spots = currentMap === 'right' ? SPOTS_RIGHT : SPOTS;
  if (currentMap === 'flower') return '花树广场';
  if (currentMap === 'prayer') return '转经轮广场';
  const fallback = currentMap === 'right' ? '郊外小路上' : '小镇街道上';
  let near=spots[0],minD=Infinity;
  for(const s of spots){const d=(x-s.x)**2+(y-s.y)**2;if(d<minD){minD=d;near=s;}}
  return minD<160*160?near.name+'附近':fallback;
}

function checkProximity() {
  if(activeAPICalls>=MAX_API) return;

  // 本地 agent 之间
  for(let i=0;i<agents.length;i++){
    for(let j=i+1;j<agents.length;j++){
      const a=agents[i],b=agents[j];
      if(a.state==='chatting'||b.state==='chatting') continue;
      const dx=a.x-b.x,dy=a.y-b.y;
      if(Math.sqrt(dx*dx+dy*dy)<EVENT_R){
        const key=`${Math.min(a.id,b.id)}-${Math.max(a.id,b.id)}`;
        const last=a.lastEventWith[key]||0;
        if(frameCount-last>EVENT_CD){
          a.lastEventWith[key]=b.lastEventWith[key]=frameCount;
          a.state=b.state='chatting';a.chatTimer=b.chatTimer=220;
          const loc=getLocName((a.x+b.x)/2,(a.y+b.y)/2);
          callAPI(a,b,loc,a.isPlayer||b.isPlayer);
          // 检查是否触发特殊任务
          if((a.isPlayer||b.isPlayer) && !specialTriggeredToday && specialEnabled){
            const partner=a.isPlayer?b:a;
            // NPC 不参与特殊任务
          }
          return;
        }
      }
    }
  }

  // 本地玩家 vs 远程玩家
  if(!myAgent||!mySocketId) return;
  for(const [remId,rp] of remotePlayers){
    if(myAgent.state==='chatting'||rp.state==='chatting') continue;
    const dx=myAgent.x-rp.x,dy=myAgent.y-rp.y;
    if(Math.sqrt(dx*dx+dy*dy)<EVENT_R){
      const key=`rp-${[mySocketId,remId].sort().join('-')}`;
      const last=myAgent.lastEventWith[key]||0;
      if(frameCount-last>EVENT_CD){
        if(mySocketId<remId){
          myAgent.lastEventWith[key]=frameCount;
          myAgent.state='chatting';myAgent.chatTimer=220;rp.state='chatting';
          const loc=getLocName((myAgent.x+rp.x)/2,(myAgent.y+rp.y)/2);
          callAPI(myAgent,rp,loc,true);
          // 特殊任务：双方都开启才触发
          if(!specialTriggeredToday&&specialEnabled&&rp.specialEnabled) {
            triggerSpecialTask(myAgent.name, rp.name);
          }
        } else {
          myAgent.lastEventWith[key]=frameCount;
        }
        return;
      }
    }
  }
}

async function callAPI(cA, cB, loc, broadcast=false) {
  activeAPICalls++;
  setStatus(`✍️ 记录 ${cA.name} 与 ${cB.name} 的偶遇...`);
  const ctrl=new AbortController();
  const timer=setTimeout(()=>ctrl.abort(),12000);
  try {
    const res=await fetch('/api/event',{
      method:'POST',headers:{'Content-Type':'application/json'},signal:ctrl.signal,
      body:JSON.stringify({
        charA:{name:cA.name,dept:cA.dept,personality:cA.personality||'活泼',interests:cA.interests||''},
        charB:{name:cB.name,dept:cB.dept,personality:cB.personality||'开朗',interests:cB.interests||''},
        location:loc,
      })
    });
    const data=await res.json();
    if(data.short||data.detail){
      if(broadcast&&socket){
        socket.emit('event:broadcast',{
          charA:{name:cA.name,dept:cA.dept,color:cA.color||'#aaa'},
          charB:{name:cB.name,dept:cB.dept,color:cB.color||'#aaa'},
          loc, short:data.short, detail:data.detail,
        });
      } else {
        // 本地 NPC 事件：只推公共板
        pushPublicEvent(cA,cB,loc,data.short||`${cA.name}与${cB.name}在${loc}相遇`);
        // 如果我在场，还推私信
        if(myAgent&&(myAgent.name===cA.name||myAgent.name===cB.name)){
          pushPrivateEvent(cA,cB,loc,data.detail||data.short||'');
        }
        setStatus('📜 新事件已记录！');
      }
    }
  } catch(e) {
    if(e.name==='AbortError') setStatus('⚠️ 事件超时，记录员去打盹了...');
    else setStatus('⚠️ 事件记录员开小差了...');
  } finally { clearTimeout(timer); activeAPICalls--; }
}

    const sx = rng(i*7.1)*W, sy = rng(i*3.3)*H*0.6;
    const alpha = 0.3 + 0.7*Math.pow(Math.abs(Math.sin(t*0.02*rng(i*2.1) + i)), 1.5);
    ctx.fillStyle = `rgba(255,255,220,${alpha})`;
    ctx.beginPath(); ctx.arc(sx, sy, 0.8+rng(i*11)*1.2, 0, Math.PI*2); ctx.fill();
  }
  // 地面
  ctx.fillStyle = '#1a1208';
  ctx.beginPath(); ctx.ellipse(W/2, H*0.72, W*0.48, H*0.32, 0, 0, Math.PI*2); ctx.fill();
  // 草地边缘
  ctx.strokeStyle = '#2a3a18'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.ellipse(W/2, H*0.72, W*0.48, H*0.32, 0, 0, Math.PI*2); ctx.stroke();
  // 篝火光晕
  const cx = W/2, cy = H*0.62;
  const flk = 0.85 + 0.15*Math.sin(t*0.22);
  const grd = ctx.createRadialGradient(cx, cy, 0, cx, cy, 220);
  grd.addColorStop(0,   `rgba(255,160,30,${0.55*flk})`);
  grd.addColorStop(0.4, `rgba(255,80,10,${0.25*flk})`);
  grd.addColorStop(1,   'rgba(0,0,0,0)');
  ctx.fillStyle = grd; ctx.fillRect(0, 0, W, H);
  // ── 像素风柴堆（圆形木柴围圈，模仿参考图）──
  ctx.save();
  // 灰烬底层
  ctx.fillStyle = '#2a1a0a';
  ctx.beginPath(); ctx.ellipse(cx, cy+8, 28, 12, 0, 0, Math.PI*2); ctx.fill();
  // 8根木柴，呈放射状排列
  const logColors = ['#7a4018','#8a5020','#6a3510','#925828'];
  ctx.lineCap = 'round';
  for (let i = 0; i < 8; i++) {
    const a = (i/8)*Math.PI*2;
    const lx1 = cx + Math.cos(a)*6,   ly1 = cy + Math.sin(a)*4;
    const lx2 = cx + Math.cos(a)*32,  ly2 = cy + Math.sin(a)*22;
    ctx.strokeStyle = logColors[i%4]; ctx.lineWidth = 7;
    ctx.beginPath(); ctx.moveTo(lx1, ly1); ctx.lineTo(lx2, ly2); ctx.stroke();
    // 木纹高亮
    ctx.strokeStyle = 'rgba(255,200,120,0.18)'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(lx1, ly1); ctx.lineTo(lx2, ly2); ctx.stroke();
    // 木柴末端深色圆
    ctx.fillStyle = '#4a2008';
    ctx.beginPath(); ctx.arc(lx2, ly2, 3.5, 0, Math.PI*2); ctx.fill();
  }
  // 中心燃烧的炭块
  ctx.fillStyle = '#cc4400';
  ctx.beginPath(); ctx.ellipse(cx, cy+4, 10, 6, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#ff6600';
  ctx.beginPath(); ctx.ellipse(cx, cy+4, 6, 4, 0, 0, Math.PI*2); ctx.fill();
  ctx.restore();

  // ── 火焰（泪滴形，像素参考图风格）──
  const flicker = Math.sin(t*0.28)*0.18 + Math.sin(t*0.43)*0.10;
  const f2      = Math.sin(t*0.19+1.2)*0.12;
  const sway    = Math.sin(t*0.14)*4;
  // 外层橙红（最宽）
  ctx.fillStyle = 'rgba(230,60,0,0.82)';
  ctx.beginPath();
  ctx.moveTo(cx+sway, cy-44*(1+flicker));
  ctx.bezierCurveTo(cx+20+sway, cy-20, cx+18, cy+8, cx, cy+2);
  ctx.bezierCurveTo(cx-18, cy+8, cx-20+sway, cy-20, cx+sway, cy-44*(1+flicker));
  ctx.fill();
  // 中层橙黄
  ctx.fillStyle = 'rgba(255,120,0,0.88)';
  ctx.beginPath();
  ctx.moveTo(cx+sway*0.7, cy-36*(1+flicker));
  ctx.bezierCurveTo(cx+14+sway*0.7, cy-16, cx+12, cy+4, cx, cy+0);
  ctx.bezierCurveTo(cx-12, cy+4, cx-14+sway*0.7, cy-16, cx+sway*0.7, cy-36*(1+flicker));
  ctx.fill();
  // 内层亮黄
  ctx.fillStyle = 'rgba(255,220,40,0.90)';
  ctx.beginPath();
  ctx.moveTo(cx+sway*0.4, cy-26*(1+f2));
  ctx.bezierCurveTo(cx+8+sway*0.4,  cy-12, cx+7, cy-2, cx, cy-4);
  ctx.bezierCurveTo(cx-7, cy-2, cx-8+sway*0.4, cy-12, cx+sway*0.4, cy-26*(1+f2));
  ctx.fill();
  // 核心白亮
  ctx.fillStyle = 'rgba(255,255,200,0.80)';
  ctx.beginPath(); ctx.ellipse(cx+sway*0.2, cy-12, 4, 7, 0, 0, Math.PI*2); ctx.fill();
  // 上升火星
  for (let i = 0; i < 12; i++) {
    const pt = ((t*0.06 + i*0.22) % 1);
    const sparkX = cx + Math.sin(i*2.1+t*0.05)*16*pt + sway*pt;
    const sparkY = cy - 8 - pt*55;
    const sa = (1-pt)*0.9;
    ctx.fillStyle = `rgba(255,${180+Math.floor(pt*75)},30,${sa})`;
    ctx.beginPath(); ctx.arc(sparkX, sparkY, 2.2*(1-pt*0.6), 0, Math.PI*2); ctx.fill();
  }
  // 坐垫 + 在此互动的玩家
  const seatUsers = []; // [{name, color, pixelAttrs, seatIdx}]
  // 自己
  if (myAgent && activeInteraction && activeInteraction.id === 'fire') {
    seatUsers.push({ name: myAgent.name, color: myAgent.color, pixelAttrs: myAgent.pixelAttrs, seatIdx: 0 });
  }
  // 远程玩家
  let remoteIdx = 1;
  for (const rp of remotePlayers.values()) {
    if (rp.interaction === 'fire' && remoteIdx < FIRE_SEATS.length) {
      seatUsers.push({ name: rp.name, color: rp.color, pixelAttrs: rp.pixelAttrs, seatIdx: remoteIdx++ });
    }
  }
  // 画坐垫和人物
  for (let i = 0; i < FIRE_SEATS.length; i++) {
    const s = FIRE_SEATS[i];
    const sx = cx + s.dx, sy = cy + s.dy;
    ctx.fillStyle = 'rgba(80,55,25,0.75)';
    ctx.beginPath(); ctx.ellipse(sx, sy+4, 18, 9, 0, 0, Math.PI*2); ctx.fill();
    const user = seatUsers.find(u => u.seatIdx === i);
    if (user) {
      if (user.pixelAttrs) drawPixelCharSitting(ctx, user.pixelAttrs, sx, sy, 30);
      else {
        ctx.fillStyle = user.color || '#aaa';
        ctx.beginPath(); ctx.arc(sx, sy-8, 8, 0, Math.PI*2); ctx.fill();
      }
      ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.font = 'bold 11px monospace'; ctx.textAlign = 'center';
      ctx.fillText(user.name, sx, sy - 28);
    }
  }
  // 出门按钮
  const ebw=120, ebh=30, ebx=W/2-60, eby=H-52;
  iBtnTent.x=ebx; iBtnTent.y=eby; iBtnTent.w=ebw; iBtnTent.h=ebh;
  ctx.fillStyle='rgba(6,13,26,0.94)';
  ctx.beginPath(); ctx.rect(ebx,eby,ebw,ebh); ctx.fill();
  ctx.strokeStyle='#cc7733'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.rect(ebx,eby,ebw,ebh); ctx.stroke();
  ctx.fillStyle='#ffcc88'; ctx.font='bold 13px sans-serif'; ctx.textAlign='center';
  ctx.fillText('🚶 离开篝火', W/2, eby+21);
  drawSceneParticipants('fire');
  ctx.restore();
}

// ── 摩天轮小空间 ──
let ferrisPhase = 'none'; // none | entering | inside | leaving
let ferrisAlpha = 0;
let ferrisRot = 0; // 本地轮子旋转角

function updateFerrisTransition() {
  if (ferrisPhase === 'none') return;
  if (ferrisPhase === 'inside') ferrisRot += 0.012;
  if (ferrisPhase === 'entering') {
    ferrisAlpha = Math.min(1, ferrisAlpha + 0.04);
    if (ferrisAlpha >= 1) { ferrisPhase = 'inside'; switchSceneBGM(bgmFerris); }
  } else if (ferrisPhase === 'leaving') {
    ferrisAlpha = Math.max(0, ferrisAlpha - 0.04);
    if (ferrisAlpha <= 0) {
      ferrisPhase = 'none';
      activeInteraction = null;
      manualMode = false;
      pickTarget(myAgent);
      if (socket) socket.emit('player:interaction', { id: null });
      switchSceneBGM(bgm);
    }
  }
}

// 摩天轮有8个吊舱
const GONDOLA_COLORS = ['#ff88bb','#88ffee','#ffee88','#88aaff','#ffaa88','#aaff88','#cc88ff','#88ffcc'];

function drawFerrisScene() {
  if (ferrisPhase === 'none' || ferrisAlpha <= 0) return;
  const t = frameCount;
  ctx.save();
  ctx.globalAlpha = ferrisAlpha;
  // 夜空背景（游乐场夜晚）
  ctx.fillStyle = '#080518'; ctx.fillRect(0, 0, W, H);
  const rng = (s) => { let x = Math.sin(s)*43758.5453; return x - Math.floor(x); };
  for (let i = 0; i < 60; i++) {
    const alpha = 0.3 + 0.7*Math.pow(Math.abs(Math.sin(t*0.015*rng(i*2.7)+i)), 1.5);
    ctx.fillStyle = `rgba(220,220,255,${alpha})`;
    ctx.beginPath(); ctx.arc(rng(i*7.1)*W, rng(i*3.3)*H*0.45, 0.8+rng(i*11)*1.2, 0, Math.PI*2); ctx.fill();
  }
  // 地面 + 灯光
  ctx.fillStyle = '#1a1530';
  ctx.fillRect(0, H*0.75, W, H*0.25);
  // 彩灯串
  for (let i = 0; i < 16; i++) {
    const lx = (i/(15))*W, ly = H*0.1 + Math.sin(i*0.9)*20;
    ctx.strokeStyle = 'rgba(180,160,80,0.4)'; ctx.lineWidth = 1;
    if (i > 0) { ctx.beginPath(); ctx.moveTo(((i-1)/15)*W, H*0.1+Math.sin((i-1)*0.9)*20); ctx.lineTo(lx, ly); ctx.stroke(); }
    ctx.fillStyle = GONDOLA_COLORS[i%8]; ctx.beginPath(); ctx.arc(lx, ly, 4, 0, Math.PI*2); ctx.fill();
  }
  // 摩天轮结构
  const wcx = W/2, wcy = H*0.47, wr = Math.min(W,H)*0.33;
  // 支柱
  ctx.fillStyle = '#3a3060'; ctx.strokeStyle = '#5a50a0'; ctx.lineWidth = 8;
  ctx.beginPath(); ctx.moveTo(wcx, wcy+wr+5); ctx.lineTo(wcx-60, H*0.75); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(wcx, wcy+wr+5); ctx.lineTo(wcx+60, H*0.75); ctx.stroke();
  // 外圈
  ctx.strokeStyle = '#8877cc'; ctx.lineWidth = 8;
  ctx.beginPath(); ctx.arc(wcx, wcy, wr, 0, Math.PI*2); ctx.stroke();
  // 内圈
  ctx.strokeStyle = 'rgba(140,120,200,0.4)'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.arc(wcx, wcy, wr*0.35, 0, Math.PI*2); ctx.stroke();
  // 辐条
  ctx.strokeStyle = 'rgba(120,100,180,0.6)'; ctx.lineWidth = 3;
  for (let i = 0; i < 8; i++) {
    const a = ferrisRot + i*Math.PI/4;
    ctx.beginPath();
    ctx.moveTo(wcx+Math.cos(a)*wr*0.35, wcy+Math.sin(a)*wr*0.35);
    ctx.lineTo(wcx+Math.cos(a)*wr,      wcy+Math.sin(a)*wr); ctx.stroke();
  }
  // 彩灯点
  ctx.strokeStyle = 'rgba(200,180,100,0.5)'; ctx.lineWidth = 1;
  for (let i = 0; i < 24; i++) {
    const a = ferrisRot*2 + i*Math.PI/12;
    const lx = wcx+Math.cos(a)*wr, ly = wcy+Math.sin(a)*wr;
    const alpha = 0.5+0.5*Math.sin(t*0.1+i);
    ctx.fillStyle = `rgba(255,240,100,${alpha})`;
    ctx.beginPath(); ctx.arc(lx, ly, 2.5, 0, Math.PI*2); ctx.fill();
  }
  // 8个吊舱 + 乘坐玩家
  const gondolaUsers = [];
  if (myAgent && activeInteraction && activeInteraction.id === 'ferris') {
    gondolaUsers.push({ name: myAgent.name, color: myAgent.color, pixelAttrs: myAgent.pixelAttrs, gondolaIdx: 0 });
  }
  let remoteIdx = 1;
  for (const rp of remotePlayers.values()) {
    if (rp.interaction === 'ferris' && remoteIdx < 8) {
      gondolaUsers.push({ name: rp.name, color: rp.color, pixelAttrs: rp.pixelAttrs, gondolaIdx: remoteIdx++ });
    }
  }
  for (let i = 0; i < 8; i++) {
    const a = ferrisRot + i*Math.PI/4;
    const gx = wcx+Math.cos(a)*wr, gy = wcy+Math.sin(a)*wr;
    // 吊绳（始终竖直）
    ctx.strokeStyle = 'rgba(160,140,200,0.7)'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(gx, gy); ctx.lineTo(gx, gy+18); ctx.stroke();
    // 吊舱
    const gc = GONDOLA_COLORS[i];
    ctx.fillStyle = gc; ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.rect(gx-14, gy+18, 28, 22); ctx.fill(); ctx.stroke();
    // 窗口
    ctx.fillStyle = 'rgba(255,255,255,0.3)'; ctx.beginPath(); ctx.rect(gx-8, gy+21, 10, 12); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.3)'; ctx.beginPath(); ctx.rect(gx+1,  gy+21, 10, 12); ctx.fill();
    // 乘客
    const user = gondolaUsers.find(u => u.gondolaIdx === i);
    if (user) {
      if (user.pixelAttrs) drawPixelCharSitting(ctx, user.pixelAttrs, gx, gy+26, 18);
      else {
        ctx.fillStyle = user.color || '#aaa';
        ctx.beginPath(); ctx.arc(gx, gy+24, 6, 0, Math.PI*2); ctx.fill();
      }
      ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.font = 'bold 10px monospace'; ctx.textAlign = 'center';
      ctx.fillText(user.name, gx, gy+13);
    }
  }
  // 中心轴
  ctx.fillStyle = '#aaaaee'; ctx.beginPath(); ctx.arc(wcx, wcy, 10, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#ffffff'; ctx.beginPath(); ctx.arc(wcx, wcy, 5, 0, Math.PI*2); ctx.fill();
  // 出门按钮
  const ebw=130, ebh=30, ebx=W/2-65, eby=H-52;
  iBtnTent.x=ebx; iBtnTent.y=eby; iBtnTent.w=ebw; iBtnTent.h=ebh;
  ctx.fillStyle='rgba(8,5,24,0.94)';
  ctx.beginPath(); ctx.rect(ebx,eby,ebw,ebh); ctx.fill();
  ctx.strokeStyle='#8866cc'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.rect(ebx,eby,ebw,ebh); ctx.stroke();
  ctx.fillStyle='#ccaaff'; ctx.font='bold 13px sans-serif'; ctx.textAlign='center';
  ctx.fillText('🎡 下车离开', W/2, eby+21);
  drawSceneParticipants('ferris');
  ctx.restore();
}

// ── 观星台小空间 ──
const STARDECK_SEATS = (() => {
  const seats = [];
  const rows = [
    { fy:0.83, n:6, x0:0.07, x1:0.93 },
    { fy:0.775,n:6, x0:0.09, x1:0.91 },
    { fy:0.72, n:6, x0:0.11, x1:0.89 },
    { fy:0.665,n:6, x0:0.13, x1:0.87 },
  ];
  for (const row of rows) {
    for (let i = 0; i < row.n; i++) {
      const t = i / (row.n - 1);
      seats.push({ fx: row.x0 + t*(row.x1 - row.x0), fy: row.fy });
    }
  }
  return seats; // 24 seats
})();

function updateStardeckTransition() {
  if (stardeckPhase === 'none') return;
  if (stardeckPhase === 'entering') {
    if (stardeckAlpha === 0) switchSceneBGM(bgmStardeck);
    stardeckAlpha = Math.min(1, stardeckAlpha + 0.04);
    if (stardeckAlpha >= 1) stardeckPhase = 'inside';
  } else if (stardeckPhase === 'leaving') {
    stardeckAlpha = Math.max(0, stardeckAlpha - 0.04);
    if (stardeckAlpha <= 0) {
      stardeckPhase = 'none';
      activeInteraction = null;
      manualMode = false;
      pickTarget(myAgent);
      restoreMainBGM();
      if (socket) socket.emit('player:interaction', { id: null });
    }
  }
}

// 小背面像素人（观星台专用，向前看）
function drawBackSilhouette(tc, attrs, cx, cy, size) {
  const s = size / 18;
  tc.imageSmoothingEnabled = false;
  const hc = (attrs && attrs.hairColor)    || '#1a0a00';
  const sk = (attrs && attrs.skinTone)     || '#d4956a';
  const tp = (attrs && attrs.topColor)     || '#4455aa';
  const bt = (attrs && attrs.bottomColor)  || '#223355';
  const r = (v) => Math.round(v);
  // 头发
  tc.fillStyle = hc;
  tc.fillRect(r(cx-3*s), r(cy-15*s), r(6*s), r(6*s));
  // 后颈皮肤
  tc.fillStyle = sk;
  tc.fillRect(r(cx-2*s), r(cy-13*s), r(4*s), r(3*s));
  // 上身 + 袖子
  tc.fillStyle = tp;
  tc.fillRect(r(cx-4*s), r(cy-9*s), r(8*s), r(6*s));
  tc.fillRect(r(cx-6*s), r(cy-9*s), r(2*s), r(5*s));
  tc.fillRect(r(cx+4*s), r(cy-9*s), r(2*s), r(5*s));
  // 下身
  tc.fillStyle = bt;
  tc.fillRect(r(cx-4*s), r(cy-3*s), r(3*s), r(4*s));
  tc.fillRect(r(cx+1*s), r(cy-3*s), r(3*s), r(4*s));
}

function drawStardeckScene() {
  if (stardeckPhase === 'none' || stardeckAlpha <= 0) return;
  const t = frameCount;
  ctx.save();
  ctx.globalAlpha = stardeckAlpha;
  const rng = (s) => { let x = Math.sin(s)*43758.5453; return x - Math.floor(x); };

  // 深空背景渐变
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#000208');
  bg.addColorStop(0.55, '#030514');
  bg.addColorStop(1, '#0a081c');
  ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

  // 银河带（对角线方向）
  ctx.save();
  ctx.translate(W*0.5, H*0.32); ctx.rotate(-0.22);
  const mw = ctx.createLinearGradient(-W*0.6, 0, W*0.6, 0);
  mw.addColorStop(0,   'rgba(40,30,90,0)');
  mw.addColorStop(0.3, 'rgba(65,55,130,0.16)');
  mw.addColorStop(0.5, 'rgba(90,80,180,0.28)');
  mw.addColorStop(0.7, 'rgba(65,55,130,0.16)');
  mw.addColorStop(1,   'rgba(40,30,90,0)');
  ctx.fillStyle = mw;
  ctx.fillRect(-W*0.6, -H*0.22, W*1.2, H*0.44);
  ctx.restore();

  // 星云（柔和彩色云团）
  const nebulaDefs = [
    {x:W*0.18,y:H*0.22,rx:170,ry:80,  c:'rgba(55,15,120,0.13)'},
    {x:W*0.62,y:H*0.14,rx:230,ry:100, c:'rgba(10,35,120,0.16)'},
    {x:W*0.84,y:H*0.38,rx:140,ry:70,  c:'rgba(100,20,80,0.13)'},
    {x:W*0.38,y:H*0.08,rx:180,ry:60,  c:'rgba(20,60,100,0.10)'},
  ];
  for (const nb of nebulaDefs) {
    const ng = ctx.createRadialGradient(nb.x, nb.y, 0, nb.x, nb.y, nb.rx);
    ng.addColorStop(0, nb.c); ng.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = ng;
    ctx.save(); ctx.scale(1, nb.ry / nb.rx);
    ctx.beginPath(); ctx.arc(nb.x, nb.y * nb.rx / nb.ry, nb.rx, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // 远处星星（细小、大量）
  for (let i = 0; i < 200; i++) {
    const sx = rng(i*7.31)*W, sy = rng(i*3.17)*H*0.63;
    const a = 0.15 + 0.55*Math.pow(Math.abs(Math.sin(t*0.008*rng(i*1.7)+i)), 2.0);
    ctx.fillStyle = `rgba(190,205,255,${a})`;
    ctx.beginPath(); ctx.arc(sx, sy, 0.55, 0, Math.PI*2); ctx.fill();
  }
  // 中等星星（带闪烁）
  for (let i = 0; i < 75; i++) {
    const sx = rng(i*11.7+1)*W, sy = rng(i*5.3+2)*H*0.61;
    const a = 0.35 + 0.65*Math.pow(Math.abs(Math.sin(t*0.016*rng(i*2.3)+i)), 1.5);
    const r = 0.8 + rng(i*8.4)*1.3;
    ctx.fillStyle = `rgba(215,225,255,${a})`;
    ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI*2); ctx.fill();
  }
  // 亮星（光晕+十字光芒）
  for (let i = 0; i < 22; i++) {
    const sx = rng(i*13.1+5)*W, sy = rng(i*6.7+3)*H*0.56;
    const a = 0.55 + 0.45*Math.pow(Math.abs(Math.sin(t*0.022*rng(i*3.1)+i)), 1.0);
    const r = 1.4 + rng(i*4.9)*1.7;
    // 光晕
    const glow = ctx.createRadialGradient(sx, sy, 0, sx, sy, r*6);
    glow.addColorStop(0, `rgba(255,255,240,${a*0.5})`);
    glow.addColorStop(1, 'rgba(255,255,240,0)');
    ctx.fillStyle = glow; ctx.beginPath(); ctx.arc(sx, sy, r*6, 0, Math.PI*2); ctx.fill();
    // 星核
    ctx.fillStyle = `rgba(255,255,252,${a})`;
    ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI*2); ctx.fill();
    // 十字光芒
    const len = r * 4.5 * a;
    ctx.strokeStyle = `rgba(255,255,220,${a*0.5})`;
    ctx.lineWidth = 0.7;
    ctx.beginPath();
    ctx.moveTo(sx-len, sy); ctx.lineTo(sx+len, sy);
    ctx.moveTo(sx, sy-len); ctx.lineTo(sx, sy+len);
    ctx.stroke();
  }

  // 流星（周期性）
  const shotP = 360, shotF = t % shotP;
  if (shotF < 70) {
    const sp2 = shotF / 70;
    const seed = Math.floor(t / shotP);
    const sx0 = rng(seed*3.7)*W*0.5 + W*0.1;
    const sy0 = rng(seed*5.1)*H*0.15;
    const tl = 100 + rng(seed*2.3)*80;
    const ex = sx0 + tl*1.8*sp2, ey = sy0 + tl*0.7*sp2;
    const sa = sp2 < 0.4 ? sp2/0.4 : 1 - (sp2-0.4)/0.6;
    const sGrad = ctx.createLinearGradient(ex-tl*sp2, ey-tl*sp2*0.38, ex, ey);
    sGrad.addColorStop(0, 'rgba(255,255,255,0)');
    sGrad.addColorStop(1, `rgba(255,255,200,${sa*0.9})`);
    ctx.strokeStyle = sGrad; ctx.lineWidth = 1.8;
    ctx.beginPath(); ctx.moveTo(ex-tl*sp2, ey-tl*sp2*0.38); ctx.lineTo(ex, ey); ctx.stroke();
    ctx.fillStyle = `rgba(255,255,255,${sa})`;
    ctx.beginPath(); ctx.arc(ex, ey, 2.2, 0, Math.PI*2); ctx.fill();
  }

  // 观星台平台（深色木板/石板）
  const platY = H * 0.595;
  const platGr = ctx.createLinearGradient(0, platY, 0, H);
  platGr.addColorStop(0,   '#141220');
  platGr.addColorStop(0.08,'#1c1a2e');
  platGr.addColorStop(1,   '#0c0a18');
  ctx.fillStyle = platGr; ctx.fillRect(0, platY, W, H - platY);
  // 平台发光边缘
  const edgGr = ctx.createLinearGradient(0, platY-6, 0, platY+10);
  edgGr.addColorStop(0, 'rgba(70,50,200,0.38)');
  edgGr.addColorStop(1, 'rgba(30,20,80,0)');
  ctx.fillStyle = edgGr; ctx.fillRect(0, platY-6, W, 16);
  ctx.strokeStyle = 'rgba(80,60,220,0.45)'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(0, platY); ctx.lineTo(W, platY); ctx.stroke();
  // 平板纹路
  ctx.strokeStyle = 'rgba(255,255,255,0.03)'; ctx.lineWidth = 1;
  for (let i = 0; i < 9; i++) {
    const py = platY + 12 + i*20;
    ctx.beginPath(); ctx.moveTo(0, py); ctx.lineTo(W, py); ctx.stroke();
  }
  // 远处山峦剪影
  ctx.fillStyle = 'rgba(8,6,20,0.85)';
  ctx.beginPath(); ctx.moveTo(0, platY);
  const peaks = [[0.05,0.96],[0.15,0.88],[0.28,0.94],[0.38,0.85],[0.50,0.91],[0.63,0.84],[0.72,0.90],[0.82,0.87],[0.92,0.93],[1.0,0.96]];
  for (const [fx2, fy2] of peaks) ctx.lineTo(W*fx2, platY + (H - platY)*fy2 - (H-platY)*0.55);
  ctx.lineTo(W, platY); ctx.closePath(); ctx.fill();

  // 坐垫和观星者
  const seatUsers = [];
  if (myAgent && activeInteraction && activeInteraction.id === 'stardeck') {
    seatUsers.push({ name: myAgent.name, color: myAgent.color, pixelAttrs: myAgent.pixelAttrs, seatIdx: 0 });
  }
  let remoteIdx = 1;
  for (const rp of remotePlayers.values()) {
    if (rp.interaction === 'stardeck' && remoteIdx < STARDECK_SEATS.length) {
      seatUsers.push({ name: rp.name, color: rp.color, pixelAttrs: rp.pixelAttrs, seatIdx: remoteIdx++ });
    }
  }
  // 从后往前画（保证前排遮挡后排）
  for (let i = STARDECK_SEATS.length - 1; i >= 0; i--) {
    const seat = STARDECK_SEATS[i];
    const sx = seat.fx * W, sy = seat.fy * H;
    // 坐垫
    ctx.fillStyle = 'rgba(40,32,80,0.82)';
    ctx.beginPath(); ctx.ellipse(sx, sy+5, 17, 8, 0, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = 'rgba(90,70,200,0.45)'; ctx.lineWidth = 0.8;
    ctx.beginPath(); ctx.ellipse(sx, sy+5, 17, 8, 0, 0, Math.PI*2); ctx.stroke();
    const user = seatUsers.find(u => u.seatIdx === i);
    if (user) {
      if (user.pixelAttrs) drawBackSilhouette(ctx, user.pixelAttrs, sx, sy, 22);
      else {
        ctx.fillStyle = 'rgba(15,10,30,0.9)';
        ctx.beginPath(); ctx.ellipse(sx, sy-4, 5, 8, 0, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(sx, sy-14, 5, 0, Math.PI*2); ctx.fill();
      }
      ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.font = 'bold 11px monospace'; ctx.textAlign = 'center';
      ctx.fillText(user.name, sx, sy - 22);
    }
  }

  // 出门按钮
  const ebw=140, ebh=30, ebx=W/2-70, eby=H-52;
  iBtnTent.x=ebx; iBtnTent.y=eby; iBtnTent.w=ebw; iBtnTent.h=ebh;
  ctx.fillStyle='rgba(5,3,18,0.94)';
  ctx.beginPath(); ctx.rect(ebx,eby,ebw,ebh); ctx.fill();
  ctx.strokeStyle='#5533dd'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.rect(ebx,eby,ebw,ebh); ctx.stroke();
  ctx.fillStyle='#aaaaff'; ctx.font='bold 13px sans-serif'; ctx.textAlign='center';
  ctx.fillText('🔭 离开观星台', W/2, eby+21);
  drawSceneParticipants('stardeck');
  ctx.restore();
}

// ── 草地飘动（在绿色草坪区域画小草叶随风摇摆）──
// 固定种子草叶位置，两张地图的草坪区域
const GRASS_BLADES_LEFT = (()=>{
  const arr=[]; const rng=(s)=>{let x=Math.sin(s)*43758.5453;return x-Math.floor(x);};
  // map_full 绿地区域：中央花园草坪、住宅区草坪
  const zones=[{x1:430,y1:170,x2:800,y2:470},{x1:50,y1:380,x2:380,y2:560}];
  for(const z of zones){
    for(let i=0;i<60;i++){
      arr.push({x:z.x1+(rng(i*7.1+z.x1)*(z.x2-z.x1)),y:z.y1+(rng(i*3.7+z.y1)*(z.y2-z.y1)),phase:rng(i*13.3)*Math.PI*2,h:4+rng(i*5.1)*5});
    }
  }
  return arr;
})();
const GRASS_BLADES_RIGHT = (()=>{
  const arr=[]; const rng=(s)=>{let x=Math.sin(s)*43758.5453;return x-Math.floor(x);};
  const zones=[{x1:290,y1:160,x2:680,y2:450},{x1:20,y1:380,x2:260,y2:560}];
  for(const z of zones){
    for(let i=0;i<55;i++){
      arr.push({x:z.x1+(rng(i*9.1+z.x1)*(z.x2-z.x1)),y:z.y1+(rng(i*4.3+z.y1)*(z.y2-z.y1)),phase:rng(i*11.7)*Math.PI*2,h:4+rng(i*6.3)*5});
    }
  }
  return arr;
})();

function drawGrassOverlay() {
  const blades = currentMap === 'right' ? GRASS_BLADES_RIGHT : GRASS_BLADES_LEFT;
  const t = frameCount * 0.045;
  ctx.save();
  for (const b of blades) {
    const sway = Math.sin(t + b.phase) * 2.5;
    const alpha = 0.35 + 0.15 * Math.sin(t * 0.7 + b.phase);
    ctx.strokeStyle = `rgba(80,160,60,${alpha})`;
    ctx.lineWidth = 1.2; ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(b.x, b.y);
    ctx.quadraticCurveTo(b.x + sway, b.y - b.h*0.6, b.x + sway*1.4, b.y - b.h);
    ctx.stroke();
  }
  ctx.restore();
}

// ── 夜空星星闪烁（右图右上角星空区域）──
// 原图星空区域约 x:1050-1407, y:0-200 → 游戏 (767-1028, 0-146)
const STARS = (()=>{
  const arr=[]; const rng=(s)=>{let x=Math.sin(s)*43758.5453;return x-Math.floor(x);};
  for(let i=0;i<55;i++){
    arr.push({
      x: 767 + rng(i*7.3) * 261,
      y: 4   + rng(i*3.9) * 138,
      r: 0.8 + rng(i*11.1) * 1.6,
      phase: rng(i*5.7) * Math.PI * 2,
      speed: 0.04 + rng(i*2.3) * 0.08,
    });
  }
  return arr;
})();

function drawStarsOverlay() {
  if (currentMap !== 'right') return;
  const t = frameCount;
  ctx.save();
  for (const s of STARS) {
    const alpha = 0.4 + 0.6 * Math.pow(Math.abs(Math.sin(t * s.speed + s.phase)), 0.7);
    ctx.fillStyle = `rgba(255,255,220,${alpha})`;
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
    // 十字光芒（较亮的星）
    if (s.r > 1.8 && alpha > 0.7) {
      const len = s.r * 2.5 * alpha;
      ctx.strokeStyle = `rgba(255,255,200,${alpha*0.5})`;
      ctx.lineWidth = 0.7;
      ctx.beginPath();
      ctx.moveTo(s.x-len, s.y); ctx.lineTo(s.x+len, s.y);
      ctx.moveTo(s.x, s.y-len); ctx.lineTo(s.x, s.y+len);
      ctx.stroke();
    }
  }
  ctx.restore();
}


// ── 帐篷相位过渡 ──
function updateTentTransition() {
  if (tentPhase === 'none') return;
  if (tentPhase === 'entering') {
    tentAlpha = Math.min(1, tentAlpha + 0.04);
    if (tentAlpha >= 1) { tentPhase = 'inside'; switchSceneBGM(bgmTent); }
  } else if (tentPhase === 'leaving') {
    tentAlpha = Math.max(0, tentAlpha - 0.04);
    if (tentAlpha <= 0) {
      tentPhase = 'none';
      activeInteraction = null;
      manualMode = false;
      pickTarget(myAgent);
      switchSceneBGM(bgm);
    }
  }
}

// ── 帐篷内部场景 ──
function drawTentInterior() {
  if (tentPhase === 'none' || tentAlpha <= 0) return;
  const t = frameCount;
  ctx.save();
  ctx.globalAlpha = tentAlpha;
  // 背景
  ctx.fillStyle = '#110a04'; ctx.fillRect(0, 0, W, H);
  // 帐篷天幕轮廓
  ctx.fillStyle = '#1f1204';
  ctx.beginPath(); ctx.moveTo(W/2, 28); ctx.lineTo(W-50, H-50); ctx.lineTo(50, H-50); ctx.closePath(); ctx.fill();
  // 挂灯光晕
  const lx = W/2, ly = 115, flk = 0.85 + 0.15*Math.sin(t*0.22);
  const glw = ctx.createRadialGradient(lx, ly, 0, lx, ly, 230*flk);
  glw.addColorStop(0,   'rgba(255,195,70,0.42)');
  glw.addColorStop(0.5, 'rgba(255,130,20,0.18)');
  glw.addColorStop(1,   'rgba(0,0,0,0)');
  ctx.fillStyle = glw; ctx.fillRect(0, 0, W, H);
  // 挂绳 + 灯笼
  ctx.strokeStyle = 'rgba(200,180,80,0.55)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(W/2, 38); ctx.lineTo(W/2, ly-14); ctx.stroke();
  ctx.fillStyle = `rgba(255,195,45,${0.92*flk})`;
  ctx.beginPath(); ctx.ellipse(lx, ly, 10, 14*flk, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = `rgba(255,240,170,${0.75*flk})`;
  ctx.beginPath(); ctx.arc(lx, ly, 5, 0, Math.PI*2); ctx.fill();
  // 地垫
  ctx.fillStyle = 'rgba(75,48,18,0.82)';
  ctx.beginPath(); ctx.ellipse(W/2, H-95, 295, 52, 0, 0, Math.PI*2); ctx.fill();
  // 左睡袋（绿色）
  ctx.fillStyle = '#3d7040';
  ctx.beginPath(); ctx.ellipse(W/2-125, H-88, 58, 23, -0.1, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#2a5030';
  ctx.beginPath(); ctx.ellipse(W/2-152, H-91, 19, 16, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#ffd9a0'; ctx.beginPath(); ctx.arc(W/2-152, H-91, 9, 0, Math.PI*2); ctx.fill();
  // 右睡袋（蓝色）
  ctx.fillStyle = '#3a3a8e';
  ctx.beginPath(); ctx.ellipse(W/2+125, H-88, 58, 23, 0.1, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#282870';
  ctx.beginPath(); ctx.ellipse(W/2+152, H-91, 19, 16, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#ffd9a0'; ctx.beginPath(); ctx.arc(W/2+152, H-91, 9, 0, Math.PI*2); ctx.fill();
  // 背包
  ctx.fillStyle = '#8B5E3C'; ctx.fillRect(W/2-18, H-192, 36, 42);
  ctx.fillRect(W/2-12, H-208, 24, 18);
  ctx.fillStyle = '#6B4020'; ctx.fillRect(W/2-8, H-184, 16, 10);
  // 帐篷内人员：本地 + 远程（最多 3 人，分三个位置）
  const tentPositions = [
    { x: W/2,       y: H-128 },   // 中央
    { x: W/2 - 148, y: H-110 },   // 左睡袋旁
    { x: W/2 + 148, y: H-110 },   // 右睡袋旁
  ];
  const tentUsers = [];
  if (myAgent && activeInteraction && activeInteraction.id === 'tent')
    tentUsers.push({ name: myAgent.name, color: myAgent.color, pixelAttrs: myAgent.pixelAttrs, isMe: true });
  for (const rp of remotePlayers.values())
    if (rp.interaction === 'tent' && tentUsers.length < 3)
      tentUsers.push({ name: rp.name, color: rp.color, pixelAttrs: rp.pixelAttrs, isMe: false });
  tentUsers.forEach((u, i) => {
    const pos = tentPositions[i];
    if (u.pixelAttrs) drawPixelCharSitting(ctx, u.pixelAttrs, pos.x, pos.y, 36);
    else {
      ctx.fillStyle = u.color || '#aaa';
      ctx.beginPath(); ctx.arc(pos.x, pos.y - 8, 10, 0, Math.PI * 2); ctx.fill();
    }
    ctx.fillStyle = u.isMe ? 'rgba(255,220,80,0.85)' : 'rgba(255,255,255,0.75)';
    ctx.font = 'bold 11px monospace'; ctx.textAlign = 'center';
    ctx.fillText(u.name, pos.x, pos.y - 42);
  });
  // 出门按钮
  const ebw=120, ebh=30, ebx=W/2-60, eby=H-52;
  iBtnTent.x=ebx; iBtnTent.y=eby; iBtnTent.w=ebw; iBtnTent.h=ebh;

  ctx.strokeStyle='#cc8844'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.rect(ebx,eby,ebw,ebh); ctx.stroke();

  ctx.fillText('🚪 出门', W/2, eby+21);
  drawSceneParticipants('tent');
  ctx.restore();
}

}

let advApiActive = false;
async function triggerAdventure(spot) {
  if (advApiActive) return;
  advApiActive = true;
  activeAPICalls++;
  try {
    const res = await fetch('/api/adventure', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        name: myAgent.name, dept: myAgent.dept, interests: myAgent.interests,
        location: spot.name, theme: spot.theme,
        mood: myAgent.mood, money: myAgent.money,
      }),
    });
    const data = await res.json();
    if (data.text) {
      // 更新状态
      myAgent.mood  = Math.max(0, Math.min(100, myAgent.mood  + (data.moodDelta  || 0)));
      myAgent.money = Math.max(0, myAgent.money + (data.moneyDelta || 0));
      localStorage.setItem('kaon_money_' + myAgent.name, myAgent.money);
      syncMoneyToServer();
      updateCharPanel(myAgent);
      addAdventureCard(data, spot.name);
      socket.emit('event:broadcast', {
        short: `✨ ${myAgent.name} 在${spot.name}触发了奇遇！`,
        color: myAgent.color,
      });
    }
  } catch(e) { console.error('奇遇API错误:', e); }
  finally { advApiActive = false; activeAPICalls--; }
}

function addAdventureCard(data, loc) {
  const panel = document.getElementById('panel-adv');
  const empty = document.getElementById('adv-empty');
  if (empty) empty.remove();

  const effectSign = (data.moneyDelta||0) >= 0 ? '+' : '';
  const moodSign   = (data.moodDelta||0)  >= 0 ? '+' : '';
  const effectClass = ((data.moneyDelta||0)+(data.moodDelta||0)) >= 0 ? 'pos' : 'neg';
  const card = document.createElement('div');
  card.className = 'adv-card';
  card.innerHTML = `
    <div class="adv-header">
      <span class="adv-icon">${data.icon||'🎲'}</span>
      <span class="adv-time">${nowTime()}</span>
    </div>
    <div class="adv-loc">📍 ${loc}</div>
    <div class="adv-body">${data.text}</div>
    <div class="adv-effect ${effectClass}">
      ${data.moodDelta!=null?`心情 ${moodSign}${data.moodDelta} `:''}
      ${data.moneyDelta!=null?`金钱 ${effectSign}${data.moneyDelta}`:''}
    </div>`;
  panel.insertBefore(card, panel.firstChild);
  // 自动跳到奇遇 tab
  switchTab('adv');
  setStatus(`✨ 奇遇触发：${data.title||loc}`);
}

// ══════════════════════════════════════════════
// ── KTV 包厢 · 节奏大师 ──
// ══════════════════════════════════════════════
const KTV_HIT_Y_RATIO = 0.80;   // hit zone Y as fraction of H
const KTV_LANE_W = 52, KTV_LANE_GAP = 10;

function ktvLaneCenterX(lane) {
  const totalW = 4 * KTV_LANE_W + 3 * KTV_LANE_GAP;
  return Math.round((W - totalW) / 2) + lane * (KTV_LANE_W + KTV_LANE_GAP) + KTV_LANE_W / 2;
}

function updateKtvTransition() {
  if (ktvPhase === 'none') return;
  if (ktvPhase === 'entering') {
    ktvAlpha = Math.min(1, ktvAlpha + 0.04);
    if (ktvAlpha >= 1) ktvPhase = 'inside';
  } else if (ktvPhase === 'inside') {
    // --- spawn notes ---
    ktvNoteSpawnTimer++;
    const interval = Math.max(18, 48 - Math.floor(ktvScore / 6));
    if (ktvNoteSpawnTimer >= interval) {
      ktvNoteSpawnTimer = 0;
      ktvNotes.push({ id: frameCount * 10 + Math.random(), lane: Math.floor(Math.random() * 4), y: -24 });
    }
    // --- move notes ---
    const spd = 4.5 + Math.floor(ktvScore / 15) * 0.4;
    const hitY = H * KTV_HIT_Y_RATIO;
    ktvNotes.forEach(n => { n.y += spd; });
    // --- check misses ---
    ktvNotes = ktvNotes.filter(n => {
      if (n.y > hitY + 45) {
        ktvCombo = 0;
        ktvHitFx.push({ lane: n.lane, label: 'MISS', timer: 36, color: '#ff4444', dy: 0 });
        return false;
      }
      return true;
    });
    // --- decay fx & lane press ---
    ktvHitFx.forEach(f => { f.timer--; f.dy -= 0.6; });
    ktvHitFx = ktvHitFx.filter(f => f.timer > 0);
    ktvLanePress = ktvLanePress.map(v => Math.max(0, v - 1));
  } else if (ktvPhase === 'leaving') {
    ktvAlpha = Math.max(0, ktvAlpha - 0.04);
    if (ktvAlpha <= 0) {
      ktvPhase = 'none'; ktvNotes = []; ktvHitFx = [];
      activeInteraction = null; manualMode = false; pickTarget(myAgent);
      if (socket) socket.emit('player:interaction', { id: null });
    }
  }
}

function drawKtvScene() {
  if (ktvPhase === 'none' || ktvAlpha <= 0) return;
  const t = frameCount;
  ctx.save(); ctx.globalAlpha = ktvAlpha;

  // ① 背景图
  if (ktvBgImg.naturalWidth) {
    const scale = Math.max(W / ktvBgImg.naturalWidth, H / ktvBgImg.naturalHeight);
    const dw = ktvBgImg.naturalWidth * scale, dh = ktvBgImg.naturalHeight * scale;
    ctx.drawImage(ktvBgImg, (W - dw) / 2, (H - dh) / 2, dw, dh);
  } else {
    ctx.fillStyle = '#08001a'; ctx.fillRect(0, 0, W, H);
  }

  // ② 下半部暗化渐变（方便看轨道）
  const ov = ctx.createLinearGradient(0, H * 0.30, 0, H);
  ov.addColorStop(0, 'rgba(0,0,10,0)');
  ov.addColorStop(0.45, 'rgba(0,0,10,0.72)');
  ov.addColorStop(1, 'rgba(0,0,10,0.92)');
  ctx.fillStyle = ov; ctx.fillRect(0, 0, W, H);

  // ③ 4条轨道
  const hitY = H * KTV_HIT_Y_RATIO;
  const trackTop = H * 0.28, trackH = hitY - trackTop;
  for (let lane = 0; lane < 4; lane++) {
    const cx2 = ktvLaneCenterX(lane);
    const lx = cx2 - KTV_LANE_W / 2;
    const col = KTV_LANE_COLORS[lane];
    // track bg
    ctx.fillStyle = `rgba(0,0,0,0.45)`;
    ctx.beginPath(); ctx.roundRect(lx, trackTop, KTV_LANE_W, trackH, 4); ctx.fill();
    // subtle lane tint
    ctx.fillStyle = col.replace(')', ',0.07)').replace('rgb','rgba').replace('#','');
    // edge glow
    ctx.strokeStyle = col + '44'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.roundRect(lx, trackTop, KTV_LANE_W, trackH, 4); ctx.stroke();
  }

  // ④ 落下的音符
  for (const n of ktvNotes) {
    if (n.y < trackTop - 24 || n.y > H + 10) continue;
    const cx2 = ktvLaneCenterX(n.lane);
    const col = KTV_LANE_COLORS[n.lane];
    ctx.shadowColor = col; ctx.shadowBlur = 12;
    ctx.fillStyle = col;
    ctx.beginPath(); ctx.roundRect(cx2 - KTV_LANE_W/2 + 5, n.y - 12, KTV_LANE_W - 10, 24, 6); ctx.fill();
    ctx.shadowBlur = 0;
    // shine
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.beginPath(); ctx.roundRect(cx2 - KTV_LANE_W/2 + 8, n.y - 9, KTV_LANE_W - 26, 8, 3); ctx.fill();
  }

  // ⑤ 打击区 (hit zone)
  for (let lane = 0; lane < 4; lane++) {
    const cx2 = ktvLaneCenterX(lane);
    const lx = cx2 - KTV_LANE_W / 2;
    const col = KTV_LANE_COLORS[lane];
    const press = ktvLanePress[lane];
    const glow = press > 0 ? 0.9 : 0.5;
    ctx.fillStyle = `rgba(255,255,255,${glow * 0.15})`;
    ctx.beginPath(); ctx.roundRect(lx + 3, hitY - 14, KTV_LANE_W - 6, 28, 5); ctx.fill();
    ctx.strokeStyle = col; ctx.lineWidth = press > 0 ? 3 : 1.5;
    ctx.shadowColor = col; ctx.shadowBlur = press > 0 ? 16 : 6;
    ctx.beginPath(); ctx.roundRect(lx + 3, hitY - 14, KTV_LANE_W - 6, 28, 5); ctx.stroke();
    ctx.shadowBlur = 0;
    // key label
    ctx.font = `bold ${press > 0 ? 15 : 13}px monospace`;
    ctx.fillStyle = press > 0 ? '#fff' : col + 'cc';
    ctx.textAlign = 'center';
    ctx.fillText(KTV_KEYS[lane], cx2, hitY + 5);
  }

  // ⑥ 打击特效飘字
  for (const fx of ktvHitFx) {
    const cx2 = ktvLaneCenterX(fx.lane);
    const elapsed = 1 - fx.timer / 40;
    ctx.globalAlpha = ktvAlpha * Math.max(0, 1 - elapsed * 1.5);
    ctx.font = 'bold 14px monospace'; ctx.textAlign = 'center';
    ctx.fillStyle = fx.color;
    ctx.shadowColor = fx.color; ctx.shadowBlur = 8;
    ctx.fillText(fx.label, cx2, hitY - 30 + fx.dy);
    ctx.shadowBlur = 0;
    ctx.globalAlpha = ktvAlpha;
  }

  // ⑦ 连击 & 分数
  const totalW2 = 4 * KTV_LANE_W + 3 * KTV_LANE_GAP;
  const startX = Math.round((W - totalW2) / 2);
  if (ktvCombo >= 3) {
    ctx.font = `bold ${Math.min(22, 12 + ktvCombo)}px monospace`;
    ctx.fillStyle = `hsl(${(t * 4) % 360},100%,65%)`;
    ctx.textAlign = 'center';
    ctx.fillText(`✨ ${ktvCombo} COMBO`, W / 2, hitY - 60);
  }
  ctx.font = '12px monospace'; ctx.fillStyle = '#ccc'; ctx.textAlign = 'left';
  ctx.fillText(`🎵 ${ktvScore}音符  ¥${ktvCoins}`, startX, H * 0.27);
  ctx.font = '11px monospace'; ctx.fillStyle = '#888'; ctx.textAlign = 'right';
  ctx.fillText('D  F  J  K 键打击', startX + totalW2, H * 0.27);

  // ⑧ 在线玩家头像（右上角）
  const ktvUsers = [];
  if (myAgent && activeInteraction && activeInteraction.id === 'ktv')
    ktvUsers.push({ name: myAgent.name, color: myAgent.color, pixelAttrs: myAgent.pixelAttrs, isMe: true });
  for (const rp of remotePlayers.values())
    if (rp.interaction === 'ktv' && ktvUsers.length < 4)
      ktvUsers.push({ name: rp.name, color: rp.color, pixelAttrs: rp.pixelAttrs, isMe: false });
  ktvUsers.forEach((u, i) => {
    const ax = W - 60, ay = 30 + i * 46;
    if (u.pixelAttrs) drawPixelChar(ctx, u.pixelAttrs, ax, ay, 28);
    else { ctx.fillStyle = u.color || '#aaa'; ctx.beginPath(); ctx.arc(ax, ay - 8, 10, 0, Math.PI * 2); ctx.fill(); }
    ctx.font = 'bold 10px monospace'; ctx.fillStyle = u.isMe ? '#ffe066' : '#ddd'; ctx.textAlign = 'center';
    ctx.fillText(u.name, ax, ay + 18);
  });

  // ⑨ 出门按钮
  const ebw = 120, ebh = 30, ebx = W / 2 - 60, eby = H - 44;
  iBtnTent.x = ebx; iBtnTent.y = eby; iBtnTent.w = ebw; iBtnTent.h = ebh;
  ctx.fillStyle = 'rgba(8,0,20,0.92)'; ctx.beginPath(); ctx.roundRect(ebx, eby, ebw, ebh, 5); ctx.fill();
  ctx.strokeStyle = '#aa44ff'; ctx.lineWidth = 1.5; ctx.beginPath(); ctx.roundRect(ebx, eby, ebw, ebh, 5); ctx.stroke();
  ctx.fillStyle = '#dd88ff'; ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('🚪 离开KTV', W / 2, eby + 21);

  drawSceneParticipants('ktv');
  ctx.restore();
}
