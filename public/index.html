<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>kaon小镇</title>
  <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
  <script src="/socket.io/socket.io.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #08081a;
      display: flex; flex-direction: column; align-items: center;
      min-height: 100vh; font-family: 'ZCOOL KuaiLe', cursive;
      color: white; padding: 16px; overflow-x: auto;
    }

    /* ===== 生日横幅 ===== */
    #bday-banner {
      position: fixed; top: 0; left: 0; right: 0; z-index: 99999;
      background: linear-gradient(90deg,#1a0040,#6a00cc,#ff2080,#ff9000,#ff2080,#6a00cc,#1a0040);
      background-size: 300% 100%;
      animation: bdaySlide 0.6s ease-out, bdayGradient 4s linear infinite;
      padding: 10px 48px 10px 16px; text-align: center; font-size: 15px;
      box-shadow: 0 4px 24px rgba(200,0,200,0.5); display: none;
    }
    #bday-banner.show { display: block; }
    @keyframes bdaySlide { from{transform:translateY(-100%);opacity:0} to{transform:translateY(0);opacity:1} }
    @keyframes bdayGradient { 0%{background-position:0% 50%} 100%{background-position:300% 50%} }
    .bday-text strong { color: #FFD700; font-size: 17px; }
    #bday-close {
      position:absolute; right:14px; top:50%; transform:translateY(-50%);
      background:none; border:none; color:rgba(255,255,255,0.6); font-size:20px; cursor:pointer;
    }

    /* ===== 新居民横幅 ===== */
    #arrival-banner {
      position: fixed; top: 0; left: 0; right: 0; z-index: 99998;
      background: linear-gradient(90deg,#003a1a,#006633,#00cc55,#FFD700,#00cc55,#006633,#003a1a);
      background-size: 300% 100%;
      animation: bdaySlide 0.6s ease-out, arrivalScroll 6s linear infinite;
      padding: 0; height: 36px; overflow: hidden; display: none;
      box-shadow: 0 4px 24px rgba(0,200,80,0.5);
    }
    #arrival-banner.show { display: block; }
    @keyframes arrivalScroll { 0%{background-position:0% 50%} 100%{background-position:300% 50%} }
    .arrival-ticker {
      display: inline-block; white-space: nowrap;
      animation: tickerMove 18s linear infinite;
      font-size: 14px; line-height: 36px; padding-left: 100%;
    }
    @keyframes tickerMove { from{transform:translateX(0)} to{transform:translateX(-100%)} }
    .arrival-ticker strong { color: #FFD700; font-size: 15px; }
    #arrival-close {
      position:absolute; right:14px; top:50%; transform:translateY(-50%);
      background:none; border:none; color:rgba(255,255,255,0.6); font-size:20px; cursor:pointer; z-index:1;
    }

    /* ===== 主布局 ===== */
    .container { display: flex; gap: 16px; align-items: flex-start; }
    .game-section { display: flex; flex-direction: column; gap: 8px; flex-shrink: 0; }
    .game-title {
      text-align:center; font-size:26px; color:#FFD700;
      text-shadow:2px 2px #5a4000,0 0 20px rgba(255,215,0,0.3); letter-spacing:8px;
    }
    canvas#gameCanvas {
      border:3px solid #4a4a8a; border-radius:6px; display:block;
      image-rendering:pixelated; image-rendering:crisp-edges;
    }
    .info-bar {
      display:flex; align-items:center; justify-content:space-between;
      background:#12122a; border:1px solid #2a2a5a; border-radius:4px;
      padding:6px 14px; font-size:13px; gap:8px;
    }
    .weather-info { color:#ccc; }
    .status-bar  { color:#888; font-size:12px; flex:1; text-align:center; }
    .online-count { color:#00ddff; font-size:12px; white-space:nowrap; }
    .btn-reenter {
      font-family:'ZCOOL KuaiLe',cursive; font-size:12px;
      background:#1a1a40; border:1px solid #3a3a7a; border-radius:5px;
      color:#8888cc; padding:3px 10px; cursor:pointer; transition:all 0.2s;
    }
    .btn-reenter:hover { border-color:#6060cc; color:#aaaaee; }
    .btn-mute {
      font-family:'ZCOOL KuaiLe',cursive; font-size:12px;
      background:#1a1a40; border:1px solid #3a3a7a; border-radius:5px;
      color:#8888cc; padding:3px 10px; cursor:pointer; transition:all 0.2s;
    }
    .btn-mute:hover { border-color:#6060cc; color:#aaaaee; }
    .btn-mute.muted { color:#555588; border-color:#2a2a5a; }

    /* ===== 右侧公告区 ===== */
    .bulletin-section { width:340px; flex-shrink:0; display:flex; flex-direction:column; gap:10px; }

    /* 三栏 tab */
    .board-tabs {
      display:flex; gap:0; border-radius:8px 8px 0 0; overflow:hidden;
      border:2px solid #4a4a8a; border-bottom:none;
    }
    .board-tab {
      flex:1; font-family:'ZCOOL KuaiLe',cursive; font-size:13px;
      padding:9px 0; border:none; cursor:pointer; letter-spacing:1px;
      background:#0d0d26; color:#5555aa; transition:all 0.18s; text-align:center;
    }
    .board-tab.active { background:#1a1a40; color:#FFD700; }
    .board-tab:hover:not(.active) { background:#141430; color:#9999cc; }

    /* 公告板 */
    .board-panels {
      background:#0a0a1e; border:2px solid #2a2a5e; border-radius:0 0 6px 6px;
      height:420px; position:relative; overflow:hidden;
    }
    .board-panel {
      position:absolute; inset:0; overflow-y:auto; padding:10px;
      display:none; flex-direction:column; gap:0;
    }
    .board-panel.active { display:flex; }
    .board-panel::-webkit-scrollbar { width:5px; }
    .board-panel::-webkit-scrollbar-track { background:#0a0a1e; }
    .board-panel::-webkit-scrollbar-thumb { background:#3a3a7a; border-radius:3px; }

    /* 公共事件卡片（简短） */
    .pub-card {
      display:flex; align-items:baseline; gap:6px;
      padding:5px 4px; border-bottom:1px solid #1a1a3a; font-size:12px;
    }
    .pub-card:last-child { border-bottom:none; }
    .pub-time { color:#333; font-size:10px; flex-shrink:0; }
    .pub-text { color:#b0b0cc; line-height:1.5; word-break:break-all; }
    .pub-dot  { width:5px; height:5px; border-radius:50%; flex-shrink:0; margin-top:4px; }

    /* 私人事件卡片 */
    .priv-card {
      background:#141430; border:1px solid #3a3a7a; border-radius:6px;
      padding:10px; margin-bottom:8px;
    }
    .priv-card:first-child { border-color:#6a6aaa; background:#1a1a3e; }
    .priv-header { display:flex; justify-content:space-between; align-items:flex-start; gap:8px; margin-bottom:4px; }
    .priv-chars  { font-size:12px; line-height:1.5; flex:1; }
    .priv-time   { color:#555; font-size:10px; flex-shrink:0; }
    .priv-loc    { color:#FFD700; font-size:10px; margin-bottom:6px; }
    .priv-body   { color:#c0c0de; font-size:12px; line-height:1.8; word-break:break-word; }

    /* 特殊任务面板 */
    .special-toggle-row {
      display:flex; align-items:center; gap:10px;
      padding:10px 12px; background:#0f0f28;
      border-bottom:1px solid #2a2a4a;
    }
    .toggle-label { font-size:13px; color:#aaaacc; flex:1; }
    .toggle-sub   { font-size:10px; color:#444466; margin-top:1px; }
    /* iOS 风格开关 */
    .toggle-switch { position:relative; width:40px; height:22px; flex-shrink:0; }
    .toggle-switch input { opacity:0; width:0; height:0; }
    .toggle-slider {
      position:absolute; inset:0; border-radius:22px;
      background:#2a2a5a; cursor:pointer; transition:background 0.25s;
    }
    .toggle-slider::before {
      content:''; position:absolute; width:16px; height:16px;
      border-radius:50%; background:white; top:3px; left:3px;
      transition:transform 0.25s;
    }
    .toggle-switch input:checked + .toggle-slider { background:#5050cc; }
    .toggle-switch input:checked + .toggle-slider::before { transform:translateX(18px); }

    .special-body { padding:10px; overflow-y:auto; flex:1; }
    .special-empty { color:#333; text-align:center; padding:30px 0; font-size:13px; line-height:2.4; }
    .special-card {
      background:#141430; border:1px solid #5a3a8a; border-radius:8px; padding:12px;
      margin-bottom:10px;
    }
    .special-card-header { font-size:12px; color:#aa88ee; margin-bottom:6px; }
    .special-task-text { color:#e0d0ff; font-size:14px; line-height:1.8; }
    .special-with { color:#7060aa; font-size:11px; margin-top:6px; }
    .special-done { color:#4ade80; font-size:11px; margin-top:6px; }
    .special-off-hint { color:#2a2a55; text-align:center; padding:30px 12px; font-size:12px; line-height:2.2; }

    /* 空状态 */
    .board-empty { color:#333; text-align:center; padding:40px 0; font-size:14px; line-height:3; }

    /* 居民列表 */
    .char-list { background:#0a0a1e; border:2px solid #2a2a5e; border-radius:6px; padding:12px; }
    .char-list-title { font-size:13px; color:#666; margin-bottom:8px; }
    .char-grid { display:grid; grid-template-columns:1fr 1fr; gap:3px 8px; }
    .char-item { display:flex; align-items:center; gap:6px; padding:3px 0; }
    .char-dot  { width:8px; height:8px; border-radius:2px; flex-shrink:0; }
    .char-name { font-size:12px; flex:1; }
    .char-name.is-player { color:#FFD700; }
    .char-name.is-remote { color:#00ddff; }
    .char-dept   { color:#444; font-size:10px; }
    .char-status { font-size:11px; }

    /* ===== 创建页 ===== */
    #create-overlay {
      position:fixed; inset:0;
      background:radial-gradient(ellipse at 60% 40%,#1a1050 0%,#08081a 70%);
      display:flex; align-items:flex-start; justify-content:center;
      z-index:9999; transition:opacity 0.6s ease; overflow-y:auto; padding:20px 16px 40px;
    }
    #create-overlay.fade-out { opacity:0; pointer-events:none; }
    .create-box {
      background:rgba(12,12,32,0.97); border:2px solid #4a4aaa; border-radius:18px;
      padding:20px 36px 20px; width:620px; max-width:98vw; text-align:center;
      box-shadow:0 0 80px rgba(80,80,255,0.2),0 0 20px rgba(0,0,0,0.8);
    }
    .create-title {
      font-size:34px; color:#FFD700;
      text-shadow:2px 2px #5a3000,0 0 40px rgba(255,215,0,0.6);
      letter-spacing:10px; margin-bottom:2px;
    }
    .create-subtitle { font-size:13px; color:#6868aa; letter-spacing:2px; margin-bottom:12px; }
    .form-rows { display:flex; flex-direction:column; gap:8px; margin-bottom:10px; text-align:left; }
    .form-row  { display:flex; gap:10px; }
    .form-field { flex:1; display:flex; flex-direction:column; gap:4px; }
    .form-field label { font-size:11px; color:#7878bb; letter-spacing:1px; }
    .form-field input {
      background:#080820; border:1px solid #2a2a6a; border-radius:7px; padding:7px 12px;
      color:#eeeeff; font-family:'ZCOOL KuaiLe',cursive; font-size:14px;
      outline:none; transition:border-color 0.2s; width:100%;
    }
    .form-field input[type="date"] { color-scheme:dark; }
    .form-field input:focus { border-color:#6060cc; }
    .gender-row { display:flex; align-items:center; gap:12px; margin-bottom:8px; }
    .gender-label { font-size:12px; color:#7878bb; letter-spacing:1px; }
    .gender-toggle { display:flex; border-radius:8px; overflow:hidden; border:1px solid #3a3a7a; }
    .gender-btn {
      font-family:'ZCOOL KuaiLe',cursive; font-size:14px; padding:7px 22px;
      border:none; cursor:pointer; background:#0d0d28; color:#7070aa;
      transition:all 0.18s; letter-spacing:1px;
    }
    .gender-btn.active { background:#3a3acc; color:#fff; }
    .gender-btn:hover:not(.active) { background:#1a1a40; color:#aaaae0; }
    .dresser {
      background:#080818; border:1px solid #2a2a5a; border-radius:12px;
      padding:8px 14px; margin-bottom:10px; display:flex; gap:16px; align-items:flex-start;
    }
    .dresser-preview { flex-shrink:0; display:flex; flex-direction:column; align-items:center; gap:6px; }
    #preview-canvas {
      image-rendering:pixelated; border:1px solid #3a3a6a; border-radius:8px;
      background:#161636; width:96px; height:96px; display:block;
    }
    #preview-name-tag { font-size:11px; color:#9090cc; text-align:center; max-width:96px; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
    .dresser-cats { flex:1; display:flex; flex-direction:column; gap:8px; }
    .cat-row { display:flex; align-items:center; gap:8px; }
    .cat-label { font-size:11px; color:#7878bb; width:52px; flex-shrink:0; text-align:right; }
    .swatch-row { display:flex; gap:4px; flex-wrap:wrap; }
    .swatch {
      width:38px; flex-shrink:0; display:flex; flex-direction:column; align-items:center; gap:2px;
      cursor:pointer; padding:3px 2px; border-radius:5px; border:1.5px solid transparent;
      transition:border-color 0.15s, background 0.15s;
    }
    .swatch:hover { border-color:#6060bb; background:rgba(80,80,180,0.15); }
    .swatch.sel   { border-color:#FFD700; background:rgba(255,215,0,0.1); }
    .swatch-chip  { width:26px; height:26px; border-radius:50%; border:1px solid rgba(255,255,255,0.1); }
    .swatch-chip.acc { border-radius:4px; display:flex; align-items:center; justify-content:center; font-size:14px; background:#1a1a3a !important; border-color:#3a3a6a; }
    .swatch-txt   { font-size:9px; color:#8888aa; text-align:center; line-height:1.1; }
    .swatch.sel .swatch-txt { color:#FFD700; }
    .btn-enter {
      font-family:'ZCOOL KuaiLe',cursive; font-size:17px; padding:13px 0;
      border:none; border-radius:10px; cursor:pointer;
      background:linear-gradient(135deg,#b08a00,#FFD700); color:#1a0e00;
      letter-spacing:2px; width:100%; transition:all 0.2s;
    }
    .btn-enter:hover:not(:disabled) { background:linear-gradient(135deg,#c8a010,#ffe040); transform:translateY(-1px); box-shadow:0 4px 20px rgba(255,200,0,0.4); }
    .btn-enter:disabled { opacity:0.35; cursor:not-allowed; }
  </style>
</head>
<body>

<audio id="bgm" src="assets/bgm.mp3" loop preload="auto"></audio>

<div id="arrival-banner">
  <span class="arrival-ticker" id="arrival-ticker"></span>
  <button id="arrival-close" onclick="hideArrivalBanner()">×</button>
</div>

<div id="bday-banner">
  <span class="bday-text" id="bday-text"></span>
  <button id="bday-close" onclick="hideBdayBanner()">×</button>
</div>

<div id="create-overlay">
  <div class="create-box">
    <div class="create-title">kaon小镇</div>
    <div class="create-subtitle">✦ 创建你的专属像素居民，开始小镇生活 ✦</div>
    <div class="form-rows">
      <div class="form-row">
        <div class="form-field">
          <label>你的名字 *</label>
          <input id="c-name" placeholder="叫我…" maxlength="6" oninput="onInfoChange()">
        </div>
        <div class="form-field">
          <label>所在部门 *</label>
          <input id="c-dept" placeholder="如：设计部、研发部…" maxlength="10" oninput="onInfoChange()">
        </div>
      </div>
      <div class="form-row">
        <div class="form-field">
          <label>兴趣爱好</label>
          <input id="c-interests" placeholder="如：画画、喝咖啡、撸猫…" maxlength="40">
        </div>
        <div class="form-field" style="max-width:160px">
          <label>生日 🎂</label>
          <input id="c-birthday" type="date">
        </div>
      </div>
    </div>
    <div class="gender-row">
      <span class="gender-label">性别</span>
      <div class="gender-toggle">
        <button class="gender-btn active" id="gbtn-m" onclick="setGender('m')">男</button>
        <button class="gender-btn"        id="gbtn-f" onclick="setGender('f')">女</button>
      </div>
    </div>
    <div class="dresser">
      <div class="dresser-preview">
        <canvas id="preview-canvas" width="96" height="96"></canvas>
        <div id="preview-name-tag">你的角色</div>
      </div>
      <div class="dresser-cats" id="dresser-cats"></div>
    </div>
    <button class="btn-enter" id="btn-enter" onclick="enterTown()" disabled>🏡 进入小镇</button>
  </div>
</div>

<div class="container">
  <div class="game-section">
    <div class="game-title">✦ kaon小镇 ✦</div>
    <canvas id="gameCanvas"></canvas>
    <div class="info-bar">
      <span class="weather-info" id="weatherInfo">☀️ 晴天</span>
      <span class="status-bar"   id="statusBar">加载资源中...</span>
      <span class="online-count" id="onlineCount">🟢 1 人在线</span>
      <button class="btn-mute" id="btn-mute" onclick="toggleMute()">🔊 音乐</button>
      <button class="btn-reenter" onclick="reenterCreator()">✏️ 重新捏人</button>
    </div>
  </div>

  <div class="bulletin-section">
    <!-- Tab 切换 -->
    <div class="board-tabs">
      <button class="board-tab active" id="tab-pub"     onclick="switchTab('pub')">📢 公共</button>
      <button class="board-tab"        id="tab-priv"    onclick="switchTab('priv')">📨 私信</button>
      <button class="board-tab"        id="tab-special" onclick="switchTab('special')">✨ 特殊</button>
    </div>

    <!-- 三个面板 -->
    <div class="board-panels">
      <!-- 公共事件 -->
      <div class="board-panel active" id="panel-pub">
        <div class="board-empty">📭 暂无事件<br><span style="font-size:11px;color:#222">等待居民们相遇...</span></div>
      </div>

      <!-- 私信 -->
      <div class="board-panel" id="panel-priv">
        <div class="board-empty">📭 暂无私信<br><span style="font-size:11px;color:#222">与别人相遇后这里会有记录</span></div>
      </div>

      <!-- 特殊任务 -->
      <div class="board-panel" id="panel-special" style="padding:0;display:none;flex-direction:column">
        <div class="special-toggle-row">
          <div>
            <div class="toggle-label">开启今日任务模式</div>
            <div class="toggle-sub">双方都开启，今日初次相遇才会触发</div>
          </div>
          <label class="toggle-switch">
            <input type="checkbox" id="special-toggle" onchange="onSpecialToggle()">
            <span class="toggle-slider"></span>
          </label>
        </div>
        <div class="special-body" id="special-body">
          <div class="special-off-hint" id="special-hint">
            开启后，与第一位<br>也开启了任务模式的同事相遇<br>将会触发一个小任务 ✨<br>
            <span style="color:#1e1e44;font-size:10px">每天只触发一次，I人友好</span>
          </div>
        </div>
      </div>
    </div>

    <!-- 居民列表 -->
    <div class="char-list">
      <div class="char-list-title">👥 今日在场居民</div>
      <div class="char-grid" id="charListContent"></div>
    </div>
  </div>
</div>

<script>
// =============================================
// 画布 & 常量
// =============================================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const MAP_W = 1408, MAP_H = 768, SCALE = 0.73;
const W = Math.round(MAP_W * SCALE), H = Math.round(MAP_H * SCALE);
canvas.width = W; canvas.height = H;

const mapImg    = new Image(); mapImg.src = 'assets/map_full.png';
const charSheet = new Image(); charSheet.src = 'assets/characters/roguelikeChar_transparent.png';
let loadedCount = 0, gameReady = false;
function onLoad() {
  if (++loadedCount >= 2) {
    gameReady = true;
    document.getElementById('statusBar').textContent = '小镇居民们开始了新的一天...';
    renderCharList();
  }
}
mapImg.onload = onLoad; mapImg.onerror = onLoad;
charSheet.onload = onLoad; charSheet.onerror = onLoad;

// =============================================
// 公告栏 Tab 切换
// =============================================
function switchTab(tab) {
  ['pub','priv','special'].forEach(t => {
    document.getElementById(`tab-${t}`).classList.toggle('active', t === tab);
    const panel = document.getElementById(`panel-${t}`);
    panel.classList.toggle('active', t === tab);
    if (t === tab) panel.style.display = 'flex';
    else panel.style.display = 'none';
  });
}

// =============================================
// 三块公告推送
// =============================================
const recentPairs = new Map();

function nowTime() {
  const d = new Date();
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function pushPublicEvent(cA, cB, loc, shortText) {
  const panel = document.getElementById('panel-pub');
  const empty = panel.querySelector('.board-empty');
  if (empty) empty.remove();

  const card = document.createElement('div');
  card.className = 'pub-card';
  card.innerHTML = `
    <div class="pub-dot" style="background:${cA.color||'#aaa'}"></div>
    <div class="pub-text">${shortText}</div>
    <div class="pub-time">${nowTime()}</div>`;
  panel.insertBefore(card, panel.firstChild);
  while (panel.children.length > 40) panel.removeChild(panel.lastChild);
}

function pushPrivateEvent(cA, cB, loc, detailText) {
  // 防重
  const pairKey = [cA.name, cB.name].sort().join('|');
  if (recentPairs.has(pairKey)) return;
  recentPairs.set(pairKey, true);
  setTimeout(() => recentPairs.delete(pairKey), 30000);

  const panel = document.getElementById('panel-priv');
  const empty = panel.querySelector('.board-empty');
  if (empty) empty.remove();

  const card = document.createElement('div');
  card.className = 'priv-card';
  card.innerHTML = `
    <div class="priv-header">
      <div class="priv-chars">
        <span style="color:${cA.color||'#aaa'}">■</span> ${cA.name}<span style="color:#555;font-size:10px">（${cA.dept||''}）</span>
        <span style="color:#444"> &amp; </span>

}

function pickTarget(a) {
  let tx, ty;
  if (Math.random() < 0.6) {
    const s = SPOTS[Math.floor(Math.random()*SPOTS.length)];
    tx = s.x+(Math.random()-.5)*90; ty = s.y+(Math.random()-.5)*70;
  } else { tx = 30+Math.random()*(W-60); ty = 30+Math.random()*(H-60); }
  a.targetX = Math.max(20,Math.min(W-20,tx));
  a.targetY = Math.max(20,Math.min(H-20,ty));
}

function updateAgent(a) {
  a.frame++;
  if (a.state==='chatting') { if(--a.chatTimer<=0){a.state='idle';a.idleTimer=60+Math.random()*80;} return; }
  if (a.idleTimer>0) { a.idleTimer--; a.state='idle'; if(a.idleTimer<=0) pickTarget(a); return; }
  a.state = 'walking';
  const dx=a.targetX-a.x, dy=a.targetY-a.y, dist=Math.sqrt(dx*dx+dy*dy);
  if (dist<4) { a.state='idle'; a.idleTimer=80+Math.random()*120; return; }
  const spd = 1.3+Math.random()*0.4;
  a.x = Math.max(20,Math.min(W-20, a.x+(dx/dist)*spd));
  a.y = Math.max(20,Math.min(H-20, a.y+(dy/dist)*spd));
}

function shadeColor(hex, amt) {
  const c=v=>Math.max(0,Math.min(255,v));
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return '#'+[r,g,b].map(v=>c(v+amt).toString(16).padStart(2,'0')).join('');
}

function drawPixelChar(tc, attrs, cx, cy, dH) {
  const CH=24,CW=16, s=dH/CH;
  const ox=Math.round(cx-CW*s/2), oy=Math.round(cy-dH);
  const {hairColor='#1a0a00',hairStyle='short',skinTone='#e8b870',topColor='#4488cc',
         bottomColor='#334466',eyeColor='#1a1a1a',shoeColor='#222222',
         hasGlasses=false,accessory='none',accessoryColor='#333333'} = attrs;
  const hairDk=shadeColor(hairColor,-20),skinDk=shadeColor(skinTone,-25),
        topDk=shadeColor(topColor,-35),topLt=shadeColor(topColor,35),
        btmDk=shadeColor(bottomColor,-35),shoeDk=shadeColor(shoeColor,-30);
  const f=(col,row,w,h,color)=>{tc.fillStyle=color;tc.fillRect(ox+col*s,oy+row*s,w*s,h*s);};
  tc.imageSmoothingEnabled=false;
  if(accessory==='hat'){f(2,0,12,3,accessoryColor);f(1,2,14,1,shadeColor(accessoryColor,-20));f(3,0,10,1,shadeColor(accessoryColor,25));}
  if(accessory!=='hat'){f(3,0,10,1,hairDk);f(2,1,12,2,hairColor);}else{f(2,3,12,1,hairColor);}
  if(hairStyle==='long'){f(1,3,2,10,hairColor);f(13,3,2,10,hairColor);f(2,11,2,4,hairColor);f(12,11,2,4,hairColor);}
  else if(hairStyle==='medium'){f(1,3,2,6,hairColor);f(13,3,2,6,hairColor);}
  if(accessory==='hairband') f(2,2,12,1,accessoryColor);
  else if(accessory==='bow'){f(4,0,2,2,accessoryColor);f(9,0,2,2,accessoryColor);f(7,1,1,1,shadeColor(accessoryColor,40));}
  f(3,3,10,5,skinTone);f(3,3,1,5,skinDk);f(12,3,1,5,skinDk);
  f(4,3,2,1,hairDk);f(9,3,2,1,hairDk);
  f(4,4,2,1,'#ffffff');f(9,4,2,1,'#ffffff');
  f(5,5,1,1,eyeColor);f(10,5,1,1,eyeColor);
  f(5,4,1,1,'#ffffffcc');f(10,4,1,1,'#ffffffcc');
  f(7,6,1,1,skinDk);f(5,7,5,1,'#cc3333');f(6,7,3,1,'#ee6666');
  if(accessory==='mask'){f(3,6,10,3,'#e0e8f0');f(4,6,8,1,'#c8d4e0');f(3,7,10,1,'#c8d4e0');}
  if(hasGlasses||accessory==='glasses'||accessory==='sunglasses'){
    if(accessory==='sunglasses'){f(3,4,4,2,'rgba(20,20,40,0.85)');f(8,4,4,2,'rgba(20,20,40,0.85)');f(7,5,2,1,'rgba(20,20,40,0.7)');}
    else{tc.save();tc.strokeStyle='#444';tc.lineWidth=Math.max(1,s*0.55);
      tc.strokeRect(ox+3.5*s,oy+4*s,3*s,2.2*s);tc.strokeRect(ox+8.5*s,oy+4*s,3*s,2.2*s);
      tc.beginPath();tc.moveTo(ox+6.5*s,oy+5*s);tc.lineTo(ox+8.5*s,oy+5*s);tc.stroke();tc.restore();}
  }
  f(7,8,2,1,skinTone);
  f(3,9,10,5,topColor);f(3,9,1,5,topDk);f(12,9,1,5,topDk);f(4,9,3,1,topLt);
  f(1,9,2,4,topColor);f(13,9,2,4,topColor);f(1,13,2,1,skinTone);f(13,13,2,1,skinTone);
  f(3,14,10,6,bottomColor);f(3,14,1,6,btmDk);f(12,14,1,6,btmDk);f(7,14,2,6,btmDk);
  f(3,20,4,2,shoeColor);f(9,20,4,2,shoeColor);f(3,21,4,1,shoeDk);f(9,21,4,1,shoeDk);
  tc.fillStyle='rgba(0,0,0,0.15)';
  tc.beginPath();tc.ellipse(cx,oy+CH*s,CW*s*0.38,s*0.7,0,0,Math.PI*2);tc.fill();
}

const CS = 30;

function drawChatBubble(cx, topY) {
  ctx.fillStyle='rgba(255,255,255,0.92)';
  ctx.beginPath();ctx.roundRect(cx-14,topY-14,28,18,5);ctx.fill();
  ctx.font='12px sans-serif';ctx.textAlign='center';ctx.fillText('💬',cx,topY);
}
function drawNameTag(cx, topY, name, color, bg) {
  ctx.imageSmoothingEnabled=true;
  const nw=name.length*9+10;
  ctx.fillStyle=bg;ctx.fillRect(cx-nw/2,topY-2,nw,13);
  ctx.fillStyle=color;ctx.font='9px monospace';ctx.textAlign='center';ctx.fillText(name,cx,topY+9);
}

function drawAgent(a) {
  const cx=Math.round(a.x), cy=Math.round(a.y);
  const bounce=a.state==='walking'?Math.sin(a.frame*0.22)*2:0;
  const charH=a.isPlayer?40:CS, feetY=cy+bounce;
  if(a.state==='chatting') drawChatBubble(cx, feetY-charH);
  if(a.isPlayer&&a.pixelAttrs){
    drawPixelChar(ctx,a.pixelAttrs,cx,feetY,charH);
    ctx.save();ctx.strokeStyle='rgba(255,215,0,0.7)';ctx.lineWidth=1.5;ctx.setLineDash([3,2]);
    ctx.strokeRect(cx-charH*16/24/2-2,feetY-charH-2,charH*16/24+4,charH+4);ctx.restore();
    drawNameTag(cx,feetY-charH,a.name,'#FFD700','rgba(50,30,0,0.9)');
  } else {
    if(!charSheet.naturalWidth) return;
    ctx.fillStyle='rgba(0,0,0,0.20)';ctx.beginPath();ctx.ellipse(cx,feetY+2,CS/2+2,4,0,0,Math.PI*2);ctx.fill();
    ctx.imageSmoothingEnabled=false;
    ctx.drawImage(charSheet,a.sc*17,a.sr*17,16,16,cx-CS/2,feetY-CS,CS,CS);
    ctx.globalAlpha=0.28;ctx.fillStyle=a.color;ctx.fillRect(cx-CS/2,feetY-CS,CS,CS);ctx.globalAlpha=1;
    drawNameTag(cx,feetY-charH,a.name,'white','rgba(0,0,0,0.78)');
  }
}

function drawRemotePlayer(rp) {
  rp._f=(rp._f||0)+1;
  const cx=Math.round(rp.x),cy=Math.round(rp.y);
  const bounce=rp.state==='walking'?Math.sin(rp._f*0.22)*2:0;
  const feetY=cy+bounce;
  if(rp.state==='chatting') drawChatBubble(cx,feetY-40);
  if(rp.pixelAttrs) drawPixelChar(ctx,rp.pixelAttrs,cx,feetY,40);
  ctx.save();ctx.strokeStyle='rgba(0,220,255,0.75)';ctx.lineWidth=1.5;ctx.setLineDash([3,2]);
  ctx.strokeRect(cx-40*16/24/2-2,feetY-40-2,40*16/24+4,40+4);ctx.restore();
  drawNameTag(cx,feetY-40,rp.name,'#00ddff','rgba(0,20,40,0.9)');
}

const EVENT_R=72, EVENT_CD=900;
let activeAPICalls=0, frameCount=0;
const MAX_API=2;

function getLocName(x,y) {
  let near=SPOTS[0],minD=Infinity;
  for(const s of SPOTS){const d=(x-s.x)**2+(y-s.y)**2;if(d<minD){minD=d;near=s;}}
  return minD<160*160?near.name+'附近':'小镇街道上';
}

function checkProximity() {
  if(activeAPICalls>=MAX_API) return;

  // 本地 agent 之间
  for(let i=0;i<agents.length;i++){
    for(let j=i+1;j<agents.length;j++){
      const a=agents[i],b=agents[j];
      if(a.state==='chatting'||b.state==='chatting') continue;
      const dx=a.x-b.x,dy=a.y-b.y;
      if(Math.sqrt(dx*dx+dy*dy)<EVENT_R){
        const key=`${Math.min(a.id,b.id)}-${Math.max(a.id,b.id)}`;
        const last=a.lastEventWith[key]||0;
        if(frameCount-last>EVENT_CD){
          a.lastEventWith[key]=b.lastEventWith[key]=frameCount;
          a.state=b.state='chatting';a.chatTimer=b.chatTimer=220;
          const loc=getLocName((a.x+b.x)/2,(a.y+b.y)/2);
          callAPI(a,b,loc,a.isPlayer||b.isPlayer);
          // 检查是否触发特殊任务
          if((a.isPlayer||b.isPlayer) && !specialTriggeredToday && specialEnabled){
            const partner=a.isPlayer?b:a;
            // NPC 不参与特殊任务
          }
          return;
        }
      }
    }
  }

  // 本地玩家 vs 远程玩家
  if(!myAgent||!mySocketId) return;
  for(const [remId,rp] of remotePlayers){
    if(myAgent.state==='chatting'||rp.state==='chatting') continue;
    const dx=myAgent.x-rp.x,dy=myAgent.y-rp.y;
    if(Math.sqrt(dx*dx+dy*dy)<EVENT_R){
      const key=`rp-${[mySocketId,remId].sort().join('-')}`;
      const last=myAgent.lastEventWith[key]||0;
      if(frameCount-last>EVENT_CD){
        if(mySocketId<remId){
          myAgent.lastEventWith[key]=frameCount;
          myAgent.state='chatting';myAgent.chatTimer=220;rp.state='chatting';
          const loc=getLocName((myAgent.x+rp.x)/2,(myAgent.y+rp.y)/2);
          callAPI(myAgent,rp,loc,true);
          // 特殊任务：双方都开启才触发
          if(!specialTriggeredToday&&specialEnabled&&rp.specialEnabled) {
            triggerSpecialTask(myAgent.name, rp.name);
          }
        } else {
          myAgent.lastEventWith[key]=frameCount;
        }
        return;
      }
    }
  }
}

async function callAPI(cA, cB, loc, broadcast=false) {
  activeAPICalls++;
  setStatus(`✍️ 记录 ${cA.name} 与 ${cB.name} 的偶遇...`);
  const ctrl=new AbortController();
  const timer=setTimeout(()=>ctrl.abort(),12000);
  try {
    const res=await fetch('/api/event',{
      method:'POST',headers:{'Content-Type':'application/json'},signal:ctrl.signal,
      body:JSON.stringify({
        charA:{name:cA.name,dept:cA.dept,personality:cA.personality||'活泼',interests:cA.interests||''},
        charB:{name:cB.name,dept:cB.dept,personality:cB.personality||'开朗',interests:cB.interests||''},
        location:loc,
      })
    });
    const data=await res.json();
    if(data.short||data.detail){
      if(broadcast&&socket){
        socket.emit('event:broadcast',{
          charA:{name:cA.name,dept:cA.dept,color:cA.color||'#aaa'},
          charB:{name:cB.name,dept:cB.dept,color:cB.color||'#aaa'},
          loc, short:data.short, detail:data.detail,
        });
      } else {
        // 本地 NPC 事件：只推公共板
        pushPublicEvent(cA,cB,loc,data.short||`${cA.name}与${cB.name}在${loc}相遇`);
        // 如果我在场，还推私信
        if(myAgent&&(myAgent.name===cA.name||myAgent.name===cB.name)){
          pushPrivateEvent(cA,cB,loc,data.detail||data.short||'');
        }
        setStatus('📜 新事件已记录！');
      }
    }
  } catch(e) {
    if(e.name==='AbortError') setStatus('⚠️ 事件超时，记录员去打盹了...');
    else setStatus('⚠️ 事件记录员开小差了...');
  } finally { clearTimeout(timer); activeAPICalls--; }
}

async function triggerSpecialTask(nameA, nameB) {
  specialTriggeredToday = true;
  localStorage.setItem(SPECIAL_KEY, '1');
  try {
    const res=await fetch('/api/special-task',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({nameA,nameB}),
    });
    const data=await res.json();
    if(data.task&&socket){
      socket.emit('event:special-broadcast',{nameA,nameB,task:data.task});
    }
  } catch(e) {}
}

    ctx.fillStyle='#08081a';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#FFD700';ctx.font='20px "ZCOOL KuaiLe",sans-serif';ctx.textAlign='center';
    ctx.fillText(`✨ kaon小镇加载中 ${loadedCount}/2 ✨`,W/2,H/2-12);
    ctx.fillStyle='#222';ctx.fillRect(W/2-120,H/2+8,240,8);
    ctx.fillStyle='#FFD700';ctx.fillRect(W/2-120,H/2+8,240*(loadedCount/2),8);
    requestAnimationFrame(loop);return;
  }
  ctx.imageSmoothingEnabled=true;ctx.imageSmoothingQuality='high';
  ctx.drawImage(mapImg,0,0,W,H);
  agents.forEach(updateAgent);
  const all=[...agents,...[...remotePlayers.values()].map(rp=>({...rp,_isRemote:true}))];
  all.sort((a,b)=>a.y-b.y).forEach(a=>a._isRemote?drawRemotePlayer(a):drawAgent(a));
  drawWeather();
  if(myAgent&&socket&&frameCount%6===0) socket.emit('player:move',{x:myAgent.x,y:myAgent.y,state:myAgent.state});
  if(frameCount%8===0)  checkProximity();
  if(frameCount%60===0) renderCharList();
  frameCount++;
  requestAnimationFrame(loop);
}
loop();

// Socket.io
// =============================================
function initSocket() {
  socket=io();
  socket.on('connect',()=>{
    mySocketId=socket.id;
    if(myAgent) emitJoin(myAgent);
  });
  socket.on('players:all',(players)=>{
    remotePlayers.clear();
    players.forEach(p=>{ if(p.id!==mySocketId) remotePlayers.set(p.id,{...p,_f:0}); });
    updateOnlineCount(); renderCharList();
  });
  socket.on('player:join',(p)=>{
    if(p.id===mySocketId) return;
    remotePlayers.set(p.id,{...p,_f:0});
    updateOnlineCount(); renderCharList();
    setStatus(`🎉 ${p.name} 进入了小镇！`);
  });
  socket.on('player:move',({id,x,y,state})=>{
    const rp=remotePlayers.get(id);
    if(rp){rp.x=x;rp.y=y;rp.state=state;}
  });
  socket.on('player:special-update',({id,specialEnabled:se})=>{
    const rp=remotePlayers.get(id);
    if(rp) rp.specialEnabled=se;
  });
  socket.on('player:leave',({id})=>{
    const rp=remotePlayers.get(id);
    if(rp) setStatus(`${rp.name} 离开了小镇`);
    remotePlayers.delete(id); updateOnlineCount(); renderCharList();
  });
  // 收到广播事件
  socket.on('event:receive',({charA,charB,loc,short,detail})=>{
    pushPublicEvent(charA,charB,loc,short||`${charA.name}与${charB.name}在${loc}相遇`);
    if(myAgent&&(myAgent.name===charA.name||myAgent.name===charB.name)){
      pushPrivateEvent(charA,charB,loc,detail||short||'');
    }
    setStatus('📜 新事件已记录！');
  });
  // 收到特殊任务
  socket.on('event:special-receive',({nameA,nameB,task})=>{
    if(myAgent&&(myAgent.name===nameA||myAgent.name===nameB)){
      pushSpecialEvent(nameA,nameB,task);
    }
  });
  // 新居民入镇
  socket.on('new:arrival',({name,dept})=>{
    showArrivalBanner([`${name}（${dept}）`]);
    setStatus(`🎉 欢迎 ${name} 首次加入小镇！`);
  });
}

function emitJoin(agent) {
  if(!socket||!socket.connected) return;
  socket.emit('player:join',{
    name:agent.name,dept:agent.dept,color:agent.color,
    pixelAttrs:agent.pixelAttrs,x:agent.x,y:agent.y,
    specialEnabled,
  });
}

function onSpecialToggle() {
  specialEnabled=document.getElementById('special-toggle').checked;
  if(socket) socket.emit('player:special-toggle',{enabled:specialEnabled});
  // 更新提示文字
  const hint=document.getElementById('special-hint');
  if(hint){
    hint.style.color=specialEnabled?'#5555aa':'#2a2a55';
  }
}

let bdayTimer=null;
async function checkBirthdays(playerName,playerBirthday){
  const today=getTodayMMDD();
  const bdays=new Set();
  CHAR_DATA.forEach(npc=>{if(npc.birthday===today)bdays.add(npc.name);});
  if(playerBirthday){
    const mmdd=playerBirthday.length>=5?playerBirthday.slice(5):playerBirthday;
    if(mmdd===today) bdays.add(playerName||'你');
  }
  try{const r=await fetch('/api/today-birthdays');const d=await r.json();if(d.birthdays)d.birthdays.forEach(n=>bdays.add(n));}catch(e){}
  if(bdays.size>0) showBirthdayBanner([...bdays]);
}
function showBirthdayBanner(names){
  const wishes=['生日快乐，愿你今天格外闪亮！🌟','愿所有美好都在今天涌来！✨','小镇因你更加热闹，生日快乐！🎊'];
  const wish=wishes[Math.floor(Math.random()*wishes.length)];
  document.getElementById('bday-text').innerHTML=`🎉🎂 今天是 <strong>${names.join('、')}</strong> 的生日！祝${names.length>1?'你们':'你'}${wish} 🎂🎉`;
  document.getElementById('bday-banner').classList.add('show');
  if(bdayTimer) clearTimeout(bdayTimer);
  bdayTimer=setTimeout(()=>hideBdayBanner(),12000);
}
function hideBdayBanner(){
  const b=document.getElementById('bday-banner');
  b.style.transition='opacity 0.8s';b.style.opacity='0';
  setTimeout(()=>{b.classList.remove('show');b.style.opacity='';b.style.transition='';},800);
}
setTimeout(()=>checkBirthdays(null,null),1500);

async function checkinUser(name,dept,birthday){
  try{
    const res=await fetch('/api/checkin',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,dept,birthday})});
    const data=await res.json();
    if(data.isNew&&socket){
      setTimeout(()=>socket.emit('player:new-arrival',{name,dept}),1200);
    }
  }catch(e){}
}

  const agent={
    id:agents.length,name,dept,personality:'活泼有趣',interests,
    birthday:birthday?birthday.slice(5):null,color:attrs.topColor,
    x:spawnX,y:spawnY,targetX:0,targetY:0,state:'idle',chatTimer:0,
    idleTimer:40,frame:0,lastEventWith:{},isPlayer:true,pixelAttrs:attrs,
  };
  agents.push(agent);pickTarget(agent);renderCharList();
  return agent;
}
