<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>瓦片查看器</title>
  <style>
    body { background:#1a1a2e; color:#fff; font-family:monospace; padding:16px; }
    h2 { color:#FFD700; margin-bottom:12px; }
    .grid { display:flex; flex-wrap:wrap; gap:6px; }
    .tile-wrap {
      display:flex; flex-direction:column; align-items:center;
      background:#2a2a4e; border:1px solid #3a3a6e;
      padding:4px; border-radius:4px; cursor:pointer;
    }
    .tile-wrap:hover { border-color:#FFD700; }
    .tile-wrap img { image-rendering:pixelated; width:48px; height:48px; }
    .tile-id { font-size:10px; color:#aaa; margin-top:2px; }
    #selected { position:fixed; top:16px; right:16px; background:#0a0a1e;
      border:2px solid #FFD700; padding:12px; border-radius:8px; font-size:13px; }
    #selected img { image-rendering:pixelated; width:96px; height:96px; display:block; margin:8px auto; }
  </style>
</head>
<body>
<h2>Kenney Tiny Town — 全部 132 个瓦片</h2>
<p style="color:#888;margin-bottom:12px;font-size:12px">点击任意瓦片查看放大图和编号</p>
<div class="grid" id="grid"></div>
<div id="selected" style="display:none">
  <div>已选择：<span id="selId" style="color:#FFD700"></span></div>
  <img id="selImg" src="">
  <div id="selPath" style="color:#888;font-size:11px;margin-top:4px"></div>
</div>
<script>
const grid = document.getElementById('grid');
for (let i = 0; i <= 131; i++) {
  const id = String(i).padStart(4, '0');
  const src = `assets/tiny-town/Tiles/tile_${id}.png`;
  const wrap = document.createElement('div');
  wrap.className = 'tile-wrap';
  wrap.innerHTML = `<img src="${src}" title="tile_${id}"><div class="tile-id">${i}</div>`;
  wrap.onclick = () => {
    document.getElementById('selected').style.display = 'block';
    document.getElementById('selId').textContent = `tile_${id} (编号 ${i})`;
    document.getElementById('selImg').src = src;
    document.getElementById('selPath').textContent = src;
  };
  grid.appendChild(wrap);
}
</script>
</body>
</html>
